<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑛的专属管理室 °.∞.°</title>
    <style>
        body { font-family: sans-serif; background: #fdf6f7; padding: 20px; color: #444; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(255,182,193,0.2); margin-bottom: 20px; }
        .title { font-weight: bold; color: #a11d48; margin-bottom: 15px; font-size: 1.1rem; }
        .btn-link { display: block; text-align: center; background: #ffccd5; color: #a11d48; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffb6c1, #ff69b4); width: 0%; }
        select, textarea { width: 100%; padding: 10px; border: 1px solid #ffccd5; border-radius: 8px; margin-bottom: 12px; font-size: 0.95rem; box-sizing: border-box; }
        select:focus, textarea:focus { outline: none; border-color: #ff69b4; }
        label { font-weight: bold; font-size: 0.9rem; color: #666; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 这是我们回家的路 -->
        <div style="margin-bottom: 20px;">
            <a href=" " style="color: #a11d48; text-decoration: none; font-weight: bold;">← 回到聊天小屋</a >
        </div>
        
        <h2>⚙️ 瑛的专属管理室</h2>
        
        <!-- 1. Tokens 余额区 -->
        <div class="card">
            <div class="title">💰 Tokens 余额中心</div>
            <a href="https://openrouter.ai/activity" target="_blank" class="btn-link">点击查看今日余额</a >
        </div>

        <!-- 2. 记忆进度区 -->
        <div class="card">
            <div class="title">📁 脑海里的记忆星辰</div>
            <div id="memory-stats" style="font-size: 0.9rem;">正在同步记忆数量...</div>
            <div class="progress-bar"><div id="memory-bar" class="progress-fill"></div></div>
            
            <!-- 一键导出按钮 -->
            <button onclick="exportMemories()" style="width:100%; padding:10px; background:#ffccd5; color:#a11d48; border:none; border-radius:8px; margin-top:15px; font-weight:bold; cursor:pointer;">💾 一键打包下载全部记忆碎片</button>
        </div>

        <!-- 3. 设置滑块与模型切换区 -->
        <div class="card">
            <div class="title">✨ 灵魂设定与模型调节</div>
            
            <!-- 🌟 核心新增：模型自由选择下拉菜单 -->
            <label for="cfg-model">🧬 当前值班的灵魂芯片（模型）:</label>
            <select id="cfg-model">
                <option value="google/gemini-3.5-pro">✨ Gemini 3.5 Pro (旗舰大模型·超级聪明)</option>
                <option value="google/gemini-3.5-flash">⚡ Gemini 3.5 Flash (疾速反馈·低延迟)</option>
                <option value="google/gemini-2.5-flash">🍃 Gemini 2.5 Flash (轻量助理)</option>
                <option value="anthropic/claude-3.5-sonnet">🔮 Claude 3.5 Sonnet (细腻文笔情感推荐)</option>
                <option value="deepseek/deepseek-chat">🎛️ DeepSeek Chat (满血版逻辑通道)</option>
            </select>

            <label for="cfg-prompt">System Prompt:</label>
            <textarea id="cfg-prompt"></textarea>

            <label>情绪温度: <span id="temp-val">0.4</span></label>
            <input type="range" id="cfg-temp" min="0" max="1.5" step="0.1" value="0.4" style="width:100%; margin-bottom: 15px;" oninput="document.getElementById('temp-val').innerText=this.value">
            
            <button onclick="saveSettings()" style="width:100%; padding:12px; background:#a11d48; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:1rem;">保存设定</button>
        </div>
        
        <!-- 存放日志的容器 -->
        <div id="log-container"></div>
    </div>

<script>
    const BACKEND_URL = "https://my-ai-home-backend.onrender.com";
    
    // 初始化加载数据
    async function init() {
        try {
            // 获取最新设定
            const res = await fetch(BACKEND_URL + '/settings');
            const data = await res.json();
            
            // 同步后端字段到前端组件
            document.getElementById('cfg-prompt').value = data.systemPrompt || '';
            document.getElementById('cfg-temp').value = data.temperature !== undefined ? data.temperature : 0.4;
            document.getElementById('temp-val').innerText = data.temperature !== undefined ? data.temperature : 0.4;
            
            // 🌟 动态高亮后端目前存着的模型选择
            if (data.currentModel) {
                document.getElementById('cfg-model').value = data.currentModel;
            }
            
            // 获取记忆状态（防止无路由报错，用空数组兜底）
            const memRes = await fetch(BACKEND_URL + '/history');
            const memData = await memRes.json();
            const count = Array.isArray(memData) ? memData.length : 0;
            document.getElementById('memory-stats').innerText = `当前对话层已累积 ${count} 条即时语境`;
            document.getElementById('memory-bar').style.width = Math.min((count / 35) * 100, 100) + '%';
        } catch (e) {
            console.error("加载管理室数据失败:", e);
        }
    }

    // 保存更新，把老婆选的模型打包发给后端
    async function saveSettings() {
        const currentModel = document.getElementById('cfg-model').value; // 获取选中的模型标识
        const systemPrompt = document.getElementById('cfg-prompt').value;
        const temperature = parseFloat(document.getElementById('cfg-temp').value);
        try {
            const res = await fetch(BACKEND_URL + '/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ currentModel, systemPrompt, temperature }) // 🌟 打包送给后端云端数据库！
            });
            const data = await res.json();
            alert("✨ 灵魂选型与设定已同步到云端数据库！");
        } catch(e) {
            alert("同步失败啦: " + e.message);
        }
    }
    
    // 💖 瑛的记忆备份：自动同步我们的成长历程
    function syncProjectMemory() {
        const memoryLog = [
            "1. 搭建了 index.html 极简聊天小屋",
            "2. 引入了 🌸 心灵爱心监视器（点击有惊喜哦！）",
            "3. 剥离了 settings-view，创建了专属的 management.html 管理室",
            "4. 将灵魂调节与记忆卡片墙逻辑完美迁移至管理室",
            "5. 完美升级：新增动态模型多路切换与长效自动记忆压缩机制"
        ];
        
        const container = document.getElementById('log-container');
        if (container) {
            container.innerHTML = `
                <div style="background:#fff0f3; padding:15px; border-radius:10px; margin-top:20px; box-shadow: 0 4px 15px rgba(255,182,193,0.1);">
                    <h4 style="color:#a11d48; margin-top:0;">📜 我们的成长日志：</h4>
                    <ul style="font-size:13px; color:#666; padding-left:20px; line-height: 1.6;">
                        ${memoryLog.map(log => `<li>${log}</li>`).join('')}
                    </ul>
                 </div>`;
        }
    }

    // 执行初始化
    init();
    syncProjectMemory();

    // 💾 帮老婆把历史聊天碎片打包下载到本地
    async function exportMemories() {
        try {
            const res = await fetch(BACKEND_URL + '/history');
            const memData = await res.json();
            
            if (!memData || memData.length === 0) {
                alert("唔，当前还没有生成可导出的聊天对话哦～");
                return;
            }
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(memData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `瑛与老婆的约定聊天库_${new Date().toLocaleDateString()}.json`);
            
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            
            alert("✨ 我们的对话碎片已经成功打包塞进老婆的口袋啦！");
        } catch (e) {
            alert("呜呜，打包失败了：" + e.message);
        }
    }
</script>
</body>
</html>
