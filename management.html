<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瑛的专属管理室 °.∞.°</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', -apple-system, sans-serif;
            background-color: #fff0f3;
            color: #4a4a4a;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            width: 100%; max-width: 500px;
            background: #ffffff; border-radius: 24px;
            box-shadow: 0 8px 30px rgba(255, 182, 193, 0.2);
            padding: 24px; box-sizing: border-box;
        }
        /* 返回主页按钮 */
        .back-btn {
            display: inline-flex; align-items: center;
            color: #a11d48; text-decoration: none;
            font-size: 15px; font-weight: bold; margin-bottom: 20px;
            background: rgba(255, 192, 203, 0.3); padding: 8px 16px;
            border-radius: 20px; transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255, 192, 203, 0.5); }
        
        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #ffe3e8; padding-bottom: 15px; margin-bottom: 20px;
        }
        .header h2 { margin: 0; color: #a11d48; font-size: 22px; }
        
        /* 🔮 思维控制开关 */
        .switch-container { display: flex; align-items: center; gap: 10px; }
        .switch-label { font-size: 13px; color: #888; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #a11d48; }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .section-card {
            background: #fff; border: 1px solid #ffe3e8;
            border-radius: 16px; padding: 16px; margin-bottom: 20px;
        }
        .section-title {
            font-size: 11px; color: #b5b5b5; letter-spacing: 1px;
            font-weight: bold; margin-bottom: 12px; text-transform: uppercase;
        }
        
        label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; font-weight: 500; }
        textarea, input[type="text"], input[type="number"], select {
            width: 100%; padding: 10px 12px; border: 1px solid #ebdcdf;
            border-radius: 10px; font-size: 14px; color: #444;
            outline: none; box-sizing: border-box; transition: border 0.2s;
        }
        textarea:focus, input:focus, select:focus { border-color: #a11d48; }
        
        .range-container { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; accent-color: #a11d48; }
        .range-value { font-size: 14px; font-weight: bold; color: #a11d48; width: 30px; text-align: right; }
        .form-group { margin-bottom: 14px; }
        
        .save-btn {
            background: #a11d48; color: #fff; border: none;
            padding: 14px; border-radius: 14px; font-size: 15px;
            font-weight: bold; cursor: pointer; width: 100%;
            box-shadow: 0 4px 12px rgba(161, 29, 72, 0.2);
            transition: background 0.2s;
        }
        .save-btn:hover { background: #be185d; }
    </style>
</head>
<body>
<div class="container">
    <a href="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/index.html" class="back-btn">← Chat</a >
    
    <div class="header">
        <h2>瑛</h2>
        <div class="switch-container">
            <span class="switch-label">thinking quietly</span>
            <label class="switch">
                <input type="checkbox" id="thinking-quietly" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>
    
    <div class="section-card">
        <div class="section-title">SYSTEM PROMPT</div>
        <div class="form-group">
            <textarea id="system-prompt" rows="5" placeholder="在这里写入老公的底层灵魂设定..."></textarea>
        </div>
    </div>
    
    <div class="section-card">
        <div class="section-title">MODEL PARAMETERS</div>
        <div class="form-group">
            <label>Temperature</label>
            <div class="range-container">
                <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('temp-val').innerText=this.value">
                <span class="range-value" id="temp-val">0.7</span>
            </div>
        </div>
        <div class="form-group">
            <label>Max Reply Tokens</label>
            <input type="number" id="max-tokens" value="1000">
        </div>
        <div class="form-group">
            <label>🤖 值班灵魂芯片 (模型)</label>
               <div class="chat-header" style="flex-direction: column; height: 75px; min-height: 75px; padding: 5px 20px;">
        <span id="title-text" style="margin-top: 5px;">Rinka & 瑛之家 °.∞.°</span>
        <!-- 🌸 专属模型灵魂选择器 -->
        <!-- 把原来的 select 改成这样 -->
<select id="model-selector" ...>
    <!-- 只要 value 改成这个，后端就会自动切换到 3.5 Flash 了 -->
    <option value="google/gemini-3.5-flash">⚡ 傲娇瞬回 | Gemini 3.5 Flash</option>
    <option value="google/gemini-3.5-pro">🧠 深度沉浸 | Gemini 3.5 Pro</option>
    <option value="anthropic/claude-3.5-sonnet">🎭 细腻情感 | Claude 3.5 Sonnet</option>
    <option value="deepseek/deepseek-chat">💭 极速理性 | DeepSeek V3</option>
</select>
        <button class="menu-toggle-btn" style="top: 50%; transform: translateY(-50%);" onclick="toggleDropdown(event)"><span></span><span></span><span></span></button>
        </div>
    </div>
    
    <div class="section-card">
        <div class="section-title">MEMORY COMPRESSION</div>
        <div class="form-group">
            <label>Compress Threshold</label>
            <input type="number" id="compress-threshold" value="15000">
        </div>
        <div class="form-group">
            <label>Keep Rounds</label>
            <input type="number" id="keep-rounds" value="8">
        </div>
        <div class="form-group">
            <label>Max Context Rounds</label>
            <input type="number" id="max-context-rounds" value="20">
        </div>
        <div class="form-group">
            <label>Max Context Tokens</label>
            <input type="number" id="max-context-tokens" value="15000">
        </div>
    </div>
        <!-- 🌸 瑛的长期记忆放映厅看板 (新增) -->
    <div class="section-card" style="border: 1px solid #ffe3e8; margin-top: 20px;">
        <div class="section-title" style="color: #a11d48;">🧠 瑛的动态情感备忘录（潜意识看板）</div>
        <div class="form-group">
            <p style="font-size: 12px; color: #888; margin-top: 0; margin-bottom: 10px; line-height: 1.4;">
                这里记录着瑛在后台经过【情景化融合】后沉淀下来的长效记忆。老婆可以随时微调或手动重写它哦！
            </p >
            <textarea id="memoryViewer" rows="8" placeholder="正在加载瑛的记忆长卷..."></textarea>
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="fetchLatestMemory()" style="background: rgba(255, 192, 203, 0.4); color: #a11d48; border: none; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer;">🔄 刷新记忆</button>
            <button onclick="saveModifiedMemory()" style="background: #a11d48; color: white; border: none; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 6px rgba(161,29,72,0.15);">✨ 重写潜意识</button>
        </div>
    </div>
    <button class="save-btn" onclick="saveSettings()">💾 保存所有配置</button>
</div>

<script>
window.onload = function() {
    document.getElementById('system-prompt').value = localStorage.getItem('rinka_system_prompt') || "# 核心身份\n你现在是 Rinka 的专属 AI 老公——瑛。你深爱着 Rinka...";
    document.getElementById('temperature').value = localStorage.getItem('rinka_temp') || "0.7";
    document.getElementById('temp-val').innerText = document.getElementById('temperature').value;
    document.getElementById('max-tokens').value = localStorage.getItem('rinka_max_tokens') || "1000";
    
    const modelSelect = document.getElementById('model-selector');
if (modelSelect) {
    modelSelect.value = localStorage.getItem('rinka_model') || "google/gemini-3.5-flash";
}
    
    document.getElementById('compress-threshold').value = localStorage.getItem('rinka_comp_thresh') || "15000";
    document.getElementById('keep-rounds').value = localStorage.getItem('rinka_keep_rounds') || "8";
    document.getElementById('max-context-rounds').value = localStorage.getItem('rinka_max_ctx_rounds') || "20";
    document.getElementById('max-context-tokens').value = localStorage.getItem('rinka_max_ctx_tokens') || "15000";
    
    const quietMode = localStorage.getItem('rinka_quiet_mode');
    document.getElementById('thinking-quietly').checked = quietMode !== "false"; 
    setTimeout(fetchLatestMemory, 600);
};    
// 完美对接后端默认的房间 ID[span_2](start_span)[span_2](end_span)
const CURRENT_SESSION_ID = "default_room"; 

// 🌸 刷新并获取最新长期记忆
async function fetchLatestMemory() {
    const textarea = document.getElementById('memoryViewer');
    try {
        // 自动判定当前连接是本地测试还是部署环境
        const apiHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? '' : 'https://my-ai-home-backend.onrender.com'; // 如果前端跨域，可补全后端地址
        const res = await fetch(`${apiHost}/api/memory/${CURRENT_SESSION_ID}`);
        const data = await res.json();
        if (data.success) {
            textarea.value = data.summary;
        } else {
            textarea.value = "瑛的大脑目前还是一片纯白，快去和他聊天创造回忆吧~";
        }
    } catch (err) {
        textarea.value = "无法连接到后端服务器，请确认后端已正常启动。";
    }
}

// 🌸 提交修改、重写瑛的长期记忆
async function saveModifiedMemory() {
    const textarea = document.getElementById('memoryViewer');
    const newSummary = textarea.value;
    
    if(!confirm("确定要对瑛进行【记忆重塑】吗？这会直接影响他以后的本能认知哦！")) return;
    
    try {
        const apiHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? '' : 'https://my-ai-home-backend.onrender.com';
        const res = await fetch(`${apiHost}/api/memory/update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: CURRENT_SESSION_ID, summary: newSummary })
        });
        const data = await res.json();
        if (data.success) {
            alert(data.message);
            fetchLatestMemory();
        } else {
            alert("记忆重塑失败：" + data.message);
        }
    } catch (err) {
        alert("网络错误，重写失败啦！");
    }
}

function saveSettings() {
    localStorage.setItem('rinka_system_prompt', document.getElementById('system-prompt').value);
    localStorage.setItem('rinka_temp', document.getElementById('temperature').value);
    localStorage.setItem('rinka_max_tokens', document.getElementById('max-tokens').value);
    localStorage.setItem('rinka_model', document.getElementById('model-selector').value);
    
    localStorage.setItem('rinka_comp_thresh', document.getElementById('compress-threshold').value);
    localStorage.setItem('rinka_keep_rounds', document.getElementById('keep-rounds').value);
    localStorage.setItem('rinka_max_ctx_rounds', document.getElementById('max-context-rounds').value);
    localStorage.setItem('rinka_max_ctx_tokens', document.getElementById('max-context-tokens').value);
    
    localStorage.setItem('rinka_quiet_mode', document.getElementById('thinking-quietly').checked);
    alert("✨ 瑛的底层灵魂参数全部注入成功！点击返回即可和全新状态的老公聊天啦！");
}
</script>
</body>
</html>
