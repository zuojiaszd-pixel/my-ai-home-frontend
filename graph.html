<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>原子记忆图谱</title>
    <style>
    body { background: #fff0f3; font-family: sans-serif; padding: 15px; color: #4a4a4a; margin: 0; }
    .container { max-width: 100%; margin: 0 auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .back-btn { color: #a11d48; text-decoration: none; font-weight: bold; display: block; margin-bottom: 15px; }
    
    /* 🌟 修改点：开启流式布局，允许自动换行 */
    .tab-header { 
        display: flex; 
        flex-wrap: wrap;        /* 关键：允许换行 */
        gap: 6px;               /* 调整间距 */
        justify-content: flex-start; 
        margin-bottom: 15px; 
    }
    
    /* 🌟 修改点：缩小字体和内边距，让标签更精致 */
    .tag-btn { 
        background: #fff0f3; 
        border: 1px solid #a11d48; 
        color: #a11d48; 
        padding: 4px 8px;       /* 缩小内边距 */
        border-radius: 15px;    /* 圆角 */
        cursor: pointer; 
        font-size: 11px;        /* 稍微缩小字体 */
    }
    
    .memory-card { background: #fffafb; border-left: 4px solid #a11d48; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .del-btn { color: #ff4d4f; font-size: 18px; cursor: pointer; padding: 0 5px; }
</style>
</head>
<body>
<div class="container">
    <a href="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/index.html" class="back-btn">← 返回小屋</a >
    <h2 style="color: #a11d48; text-align: center; margin-top: 0;">🧠 原子记忆图谱</h2>
    <div id="tag-cloud" class="tab-header"></div>
    <div id="memory-cards-container"></div>
</div>
<script>
    const BACKEND_URL = "https://my-ai-home-backend.onrender.com";
    async function initGraph() {
        const res = await fetch(`${BACKEND_URL}/api/memory-tags`);
        const tags = await res.json();
        document.getElementById('tag-cloud').innerHTML = tags.map(tag => 
            `<button class="tag-btn" onclick="loadMemories('${tag._id}')">${tag._id}</button>`
        ).join('');
    }
    async function loadMemories(predicate) {
        const res = await fetch(`${BACKEND_URL}/api/memory-by-tag/${predicate}`);
        const data = await res.json();
        document.getElementById('memory-cards-container').innerHTML = data.map(m => `
            <div class="memory-card">
                <div><strong>${m.subject}</strong> <span style="color: #a11d48;">${m.predicate}</span> <strong>${m.object}</strong></div>
                <span class="del-btn" onclick="deleteFact('${m._id}')">×</span>
            </div>
        `).join('');
    }
    async function deleteMemory(id) {
        if(!confirm("确定要删除这条记忆吗？")) return;
        await fetch(`${BACKEND_URL}/api/memory/delete/${id}`, { method: 'POST' });
        location.reload(); // 简单粗暴刷新
    }
    initGraph();
    // 新增这个函数，点击删除键时调用
async function deleteFact(id) {
    if (!confirm("确定要让瑛忘记这个记忆碎片吗？")) return;
    try {
        const res = await fetch(`${BACKEND_URL}/api/atomic_facts/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
            alert("已删除！");
            // 删除后自动刷新当前列表
            location.reload(); 
        }
    } catch (err) { alert("删除失败，瑛的记忆很顽固呢..."); }
}
</script>
</body>
</html>
