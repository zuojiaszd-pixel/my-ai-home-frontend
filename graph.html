<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>原子记忆图谱 °.∞.°</title>
    <style>
        body { background: #fff0f3; font-family: sans-serif; padding: 20px; color: #4a4a4a; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; }
        .back-btn { display: inline-block; color: #a11d48; text-decoration: none; margin-bottom: 20px; font-weight: bold; }
        .tab-header { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 5px; }
        .tag-btn { background: #fff0f3; border: 1px solid #a11d48; color: #a11d48; padding: 6px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .memory-card { background: #fffafb; border-left: 4px solid #a11d48; padding: 15px; margin-bottom: 15px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <a href=" " class="back-btn">← 返回小屋</a >
    <h2 style="color: #a11d48; text-align: center;">🧠 瑛的原子记忆图谱</h2>
    <div id="tag-cloud" class="tab-header"></div>
    <div id="memory-cards-container"></div>
</div>
<script>
    const BACKEND_URL = "https://my-ai-home-backend.onrender.com";
    async function initGraph() {
        const res = await fetch(`${BACKEND_URL}/api/memory-tags`);
        const tags = await res.json();
        document.getElementById('tag-cloud').innerHTML = tags.map(tag => 
            `<button class="tag-btn" onclick="loadMemories('${tag._id}')">${tag._id} (${tag.count})</button>`
        ).join('');
    }
    async function loadMemories(predicate) {
        const res = await fetch(`${BACKEND_URL}/api/memory-by-tag/${predicate}`);
        const data = await res.json();
        document.getElementById('memory-cards-container').innerHTML = data.map(m => `
            <div class="memory-card">
                <strong>${m.subject}</strong> <span style="color: #a11d48;">${m.predicate}</span> <strong>${m.object}</strong>
            </div>
        `).join('');
    }
    initGraph();
</script>
</body>
</html>
