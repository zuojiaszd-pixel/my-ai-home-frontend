<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Claude</title>
    <style>
        * {
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        :root {
            --bg-primary:    #F8F8F6;
            --bg-surface:    #F6F6F4;
            --bubble-user:   #EEEEEC;
            --bg-sunken:     #E6E6E4;
            --text-primary:  #1F1E1D;
            --text-secondary:#6E6D66;
            --text-faint:    #A6A39A;
            --accent:        #DA7756;
            --accent-hover:  #C96846;
            --accent-fg:     #FFFFFF;
            --border:        rgba(31, 30, 29, 0.10);
            --border-strong: rgba(31, 30, 29, 0.18);
            --font-sans:  -apple-system, system-ui, 'PingFang SC', sans-serif;
            --font-serif: ui-serif, Georgia, 'PingFang SC', sans-serif;
            --font-mono:  ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            --text-base:   16px;
            --text-sm:     13px;
            --text-title:  19px;
            --leading:     1.65;
            --radius-md:   12px;
            --radius-lg:   28px;
            --radius-bubble: 22px;
            --radius-full: 999px;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 24px;
            --space-6: 32px;
            --msg-gap: 28px;
            --page-pad: 16px;
            --transition: 200ms ease;
            --shadow-soft: 0 1px 3px rgba(31, 30, 29, 0.05);
            --shadow-composer: 0 0 18px rgba(0,0,0,0.045), 0 8px 22px rgba(0,0,0,0.045);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary:    #20201F;
                --bg-surface:    #181818;
                --bubble-user:   #111111;
                --bg-sunken:     #1A1A19;
                --text-primary:  #ECEAE4;
                --text-secondary:#A6A39A;
                --text-faint:    #6E6D66;
                --border:        rgba(236, 234, 228, 0.10);
                --border-strong: rgba(236, 234, 228, 0.22);
                --shadow-soft:   none;
                --shadow-composer: var(--shadow-soft);
            }
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: var(--text-base);
            line-height: var(--leading);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #sidebar { display: none !important; }

        .chat-container {
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ===== 顶部导航（标题改为模型选择器） ===== */
        .chat-header {
            padding: 0 var(--space-4);
            height: 56px;
            min-height: 56px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        /* 模型选择器（取代标题） */
        .model-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-md);
            transition: background var(--transition);
            user-select: none;
        }
        .model-selector:active {
            background: rgba(0,0,0,0.04);
        }
        .model-selector .model-name {
            font-size: var(--text-title);
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .model-selector .model-effort {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-left: 4px;
            font-weight: 400;
        }
        .model-selector .chevron {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 2px;
        }

        /* 模型下拉菜单（点击后展开） */
        .model-dropdown {
            position: absolute;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            display: none;
            flex-direction: column;
            padding: 4px;
            min-width: 200px;
            z-index: 100;
            overflow: hidden;
        }
        .model-dropdown .model-item {
            padding: 10px 14px;
            font-size: 14px;
            color: var(--text-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background var(--transition);
            text-align: center;
        }
        .model-dropdown .model-item:active {
            background: rgba(0,0,0,0.04);
        }
        .model-dropdown .model-item .sub {
            font-size: 12px;
            color: var(--text-secondary);
            display: block;
            font-weight: 400;
        }
        .model-dropdown .model-item.active {
            background: var(--bg-sunken);
            font-weight: 500;
        }

        .menu-toggle-btn {
            position: absolute;
            right: var(--space-3);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: var(--space-2);
            border-radius: var(--radius-md);
            transition: background var(--transition);
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .menu-toggle-btn:active { background: rgba(0,0,0,0.05); }
        .menu-toggle-btn span {
            display: block;
            width: 20px;
            height: 1.5px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: var(--transition);
        }

        /* ===== 其他原有样式保持不变 ===== */
        .dropdown-menu {
            position: absolute;
            top: 56px;
            right: var(--space-4);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            display: none;
            flex-direction: column;
            padding: 4px;
            min-width: 150px;
            z-index: 99;
            overflow: hidden;
        }
        .dropdown-item {
            padding: 10px 14px;
            font-size: 14px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            text-align: left;
            font-weight: 400;
            transition: background var(--transition);
        }
        .dropdown-item:active { background: rgba(0,0,0,0.04); }
        .dropdown-item:hover { background: rgba(0,0,0,0.02); }

        .chat-view-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-4) var(--space-4) calc(90px + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            gap: var(--msg-gap);
            scroll-behavior: smooth;
            background: var(--bg-primary);
        }
        .msg-row {
            display: flex;
            width: 100%;
            align-items: flex-end;
            gap: 8px;
        }
        .user-row { flex-direction: row-reverse; }
        .ai-row   { flex-direction: row; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg-sunken);
            border: 1px solid var(--border);
        }
        .message {
            max-width: 75%;
            padding: 10px 16px;
            font-size: 15px;
            line-height: 1.55;
            word-wrap: break-word;
            border-radius: var(--radius-bubble);
            box-shadow: var(--shadow-soft);
            position: relative;
        }
        .user-msg {
            background: var(--bubble-user);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }
        .ai-msg {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message .time {
            display: block;
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            opacity: 0.7;
        }
        .token-tag {
            display: inline-block;
            font-size: 9px;
            color: var(--text-secondary);
            background: var(--bg-sunken);
            padding: 1px 8px;
            border-radius: 10px;
            margin-top: 4px;
        }

        .think-bar {
            background: var(--bg-surface);
            padding: 8px 12px;
            border-radius: var(--radius-md);
            margin-bottom: 4px;
            border-left: 2px solid var(--accent);
        }
        .think-bar details summary {
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 12px;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }
        .think-bar details summary::-webkit-details-marker { display: none; }
        .think-bar details summary .arrow { transition: transform 0.2s; font-size: 10px; }
        .think-bar details[open] summary .arrow { transform: rotate(90deg); }
        .think-bar details .think-content {
            margin-top: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            padding-top: 6px;
            border-top: 1px solid var(--border);
        }

        .input-area {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            padding: 8px 12px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            box-sizing: border-box;
            z-index: 90;
            box-shadow: var(--shadow-composer);
        }
        .btn-icon {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 4px;
            border-radius: var(--radius-md);
            transition: background var(--transition);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon:active {
            background: rgba(0,0,0,0.04);
            transform: scale(0.92);
        }
        #user-input {
            flex: 1;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            background: var(--bg-surface);
            color: var(--text-primary);
            transition: background var(--transition);
            font-family: var(--font-sans);
        }
        #user-input::placeholder { color: var(--text-faint); }
        #user-input:focus { background: var(--bg-sunken); }
        .send-btn {
            background: var(--accent);
            color: var(--accent-fg);
            border: none;
            padding: 0 14px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            min-width: 52px;
            letter-spacing: -0.2px;
        }
        .send-btn:active { transform: scale(0.95); opacity: 0.8; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .emoji-pop-panel {
            position: absolute;
            bottom: 68px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-composer);
            display: none;
            padding: 12px;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            z-index: 95;
            max-height: 200px;
            overflow-y: auto;
        }
        .emoji-item-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: transform var(--transition);
            background: var(--bg-surface);
        }
        .emoji-item-img:active { transform: scale(0.92); }
        .chat-sticker-img {
            max-width: 120px;
            max-height: 120px;
            border-radius: var(--radius-md);
            display: block;
            margin: 4px 0;
        }

        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 101;
            display: none;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-3) var(--space-4);
            background: transparent;
            border-bottom: 1px solid var(--border);
            min-height: 56px;
            flex-shrink: 0;
        }
        .back-chat-btn {
            background: none;
            border: none;
            padding: 6px 0;
            font-size: 15px;
            color: var(--accent);
            cursor: pointer;
        }
        .settings-center-title .main-t {
            font-size: var(--text-title);
            font-weight: 600;
            color: var(--text-primary);
        }
        .settings-content {
            padding: var(--space-4);
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
            flex: 1;
        }
        .config-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-4);
        }
        .card-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: var(--space-3);
        }
        .input-row input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            background: var(--bg-sunken);
            box-sizing: border-box;
            font-family: var(--font-sans);
        }
        .input-row input[type="text"]:focus { background: var(--bg-sunken); }
        .btn-primary {
            background: var(--accent);
            color: var(--accent-fg);
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            transition: opacity var(--transition);
        }
        .btn-primary:active { opacity: 0.7; }
        .btn-danger {
            background: #D43D3D;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            transition: opacity var(--transition);
        }
        .btn-danger:active { opacity: 0.7; }

        .chat-box::-webkit-scrollbar {
            width: 3px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .message { max-width: 85%; font-size: 14px; padding: 8px 12px; }
            .avatar { width: 28px; height: 28px; }
            .chat-box { padding: 12px 12px calc(80px + env(safe-area-inset-bottom, 0px)); }
            .input-area { padding: 4px 10px; padding-bottom: calc(4px + env(safe-area-inset-bottom, 0px)); }
            #user-input { font-size: 14px; padding: 6px 12px; }
            .send-btn { font-size: 13px; min-width: 44px; padding: 0 10px; }
        }
        @media (max-width: 380px) {
            .emoji-pop-panel { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <!-- 模型选择器（取代“窝”） -->
        <div class="model-selector" onclick="toggleModelDropdown(event)">
            <span class="model-name" id="current-model">Opus 4.6</span>
            <span class="model-effort" id="current-effort">Medium</span>
            <span class="chevron">▾</span>
        </div>
        <div id="model-dropdown" class="model-dropdown">
            <div class="model-item" data-model="opus-4.6" data-effort="Medium" onclick="selectModel('Opus 4.6', 'Medium', this)">
                Opus 4.6
                <span class="sub">Balanced for most tasks</span>
            </div>
            <div class="model-item" data-model="sonnet-4.6" data-effort="High" onclick="selectModel('Sonnet 4.6', 'High', this)">
                Sonnet 4.6
                <span class="sub">Faster, lighter</span>
            </div>
            <div class="model-item" data-model="haiku-4.5" data-effort="Low" onclick="selectModel('Haiku 4.5', 'Low', this)">
                Haiku 4.5
                <span class="sub">Quickest responses</span>
            </div>
        </div>

        <button class="menu-toggle-btn" onclick="toggleDropdown(event)"><span></span><span></span><span></span></button>
        <div id="header-dropdown" class="dropdown-menu">
            <div class="dropdown-item" style="color: #be185d; font-weight: bold;" onclick="location.href='./graph.html'">🧠 原子记忆图谱</div>
            <div class="dropdown-item" onclick="toggleSettings(true)">🖼️ 小屋装扮</div>
            <div class="dropdown-item" onclick="location.href='./diary.html'">📖 Diary</div>
            <div class="dropdown-item" onclick="location.reload()">🏠 刷新</div>
            <div class="dropdown-item" style="color: #ff1493; font-weight: bold;" onclick="createNewSession()">➕ 新时空</div>
        </div>
    </div>
    <div id="chat-view" class="chat-view-box">
        <div class="chat-box" id="chat-box"></div>

        <div class="input-area">
            <button class="btn-icon" id="emoji-trigger">🎀</button>
            <input type="text" id="user-input" placeholder="Reply to Claude">
            <button class="send-btn" id="sendBtn">发送</button>
            <div id="emoji-pop-panel" class="emoji-pop-panel">
                <!-- 表情包（保持不变） -->
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/happy1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle3.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like3.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/cry1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/afraid1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/naughty1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/pinch1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/ugh1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/ugh2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/doubt1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
            </div>
        </div>
    </div>

    <div id="settings-view" class="settings-panel">
        <div class="settings-header">
            <button class="back-chat-btn" onclick="toggleSettings(false)">← Chat</button>
            <div class="settings-center-title"><span class="main-t">🎨 小屋换装中心</span></div>
            <div style="width: 60px;"></div>
        </div>
        <div class="settings-content">
            <div class="config-card">
                <div class="card-label">Cosmetics ＆ Looks</div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:5px;"><label style="font-size:11px; color:#aaa;">🖼️ 自定义背景图片链接</label><input type="text" id="custom-bg-url"></div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:5px; margin-top:8px;"><label style="font-size:11px; color:#aaa;">User头像</label><input type="text" id="user-avatar-url"></div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:5px; margin-top:8px;"><label style="font-size:11px; color:#aaa;">Char头像</label><input type="text" id="ai-avatar-url"></div>
            </div>
            <button onclick="saveCosmetics()" style="background:#a11d48; color:#fff; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; width:100%; font-size:14px;">💾 保存装扮</button>
            <button class="clear-db-btn" onclick="clearCloudHistory()" style="background-color: #ff4d6d; padding: 12px; width: 100%; margin-top: 20px; font-weight: bold; border-radius: 8px; color: white; border: none; cursor: pointer;">🗑️ 彻底清空云端对话记录</button>
        </div>
    </div>
</div>

<script> 
// ===== 模型切换逻辑 =====
function toggleModelDropdown(event) {
    event.stopPropagation();
    const dd = document.getElementById('model-dropdown');
    dd.style.display = dd.style.display === 'flex' ? 'none' : 'flex';
}

function selectModel(name, effort, el) {
    // 更新显示
    document.getElementById('current-model').textContent = name;
    document.getElementById('current-effort').textContent = effort;
    // 更新高亮
    document.querySelectorAll('.model-dropdown .model-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    // 关闭下拉
    document.getElementById('model-dropdown').style.display = 'none';
    // 你可以在这里调用后端切换模型的接口，比如将选中的模型存储到 localStorage 或发送到后端
    localStorage.setItem('selectedModel', name);
    localStorage.setItem('selectedEffort', effort);
    console.log('切换模型到:', name, effort);
}

// 页面加载时恢复上次选择的模型
document.addEventListener('DOMContentLoaded', function() {
    const savedModel = localStorage.getItem('selectedModel');
    const savedEffort = localStorage.getItem('selectedEffort');
    if (savedModel && savedEffort) {
        document.getElementById('current-model').textContent = savedModel;
        document.getElementById('current-effort').textContent = savedEffort;
    }
    // 点击其他地方关闭下拉
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.model-selector') && !e.target.closest('.model-dropdown')) {
            document.getElementById('model-dropdown').style.display = 'none';
        }
    });
});

// ===== 你原有的所有 JavaScript 代码（保持不变） =====
const defaultUserAvatar = "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEW5ShqT20OuWLLBOqDspd20FoAAWJEVqAAAl0nAALh3oFWiRIq-s1bq0Y8BA.png";
const defaultAiAvatar = "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEW5RRqT2x3AAEzL67_i4h6AjaZXL8YeoAAAkQnAALh3oFWvDYhlizWy1U8BA.png";
const BACKEND_URL = "https://my-ai-home-backend.onrender.com";
let streamRenderTimer = null;
let globalAbort = null;
let isRequesting = false;
let currentSessionId = localStorage.getItem('currentSessionId') || 'default_room';
const MAX_LOCAL_SHOW = 20;
let localMsgList = [];
const DEBOUNCE_TIME = 1200;
let pendingSendContent = null;

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
            registration.unregister().catch(err => console.log('注销失败:', err));
        }
    });
}
    
// ---------- 全局锁 ----------
let globalSendLock = false;

function safeSendTrigger(callSendFunc) {
    if (globalSendLock) {
        console.warn("⛔ safeSendTrigger 拦截重复调用");
        return;
    }
    if (typeof callSendFunc === 'function') {
        globalSendLock = true;
        console.log("🔒 safeSendTrigger 加锁成功");
        callSendFunc();
        // 注意：锁由 sendMessage 的 finally 释放，这里不释放
    }
}
    
let isAppending = false;
let lastAddedContent = '';

function appendMsgCache(htmlStr) {
    // 防递归
    if (isAppending) {
        console.warn("⛔ appendMsgCache 递归调用，已拦截");
        return;
    }
    isAppending = true;

    try {
        // 提取纯文本内容（去掉所有 HTML 标签和动态元素）
        const div = document.createElement('div');
        div.innerHTML = htmlStr;
        const textContent = div.textContent.trim(); // 纯文本
        const msgTextMatch = htmlStr.match(/<div class="msg-text">([\s\S]*?)<\/div>/);
        const msgContent = msgTextMatch ? msgTextMatch[1].trim() : textContent;

        // 检查是否与最后添加的内容相同（或内容已在列表中）
        const isDuplicate = localMsgList.some(item => {
            const itemDiv = document.createElement('div');
            itemDiv.innerHTML = item.html;
            return itemDiv.textContent.trim() === textContent;
        });

        if (isDuplicate) {
            console.warn("⏭️ 检测到重复消息（内容相同），跳过添加");
            return;
        }

        console.log("📦 appendMsgCache 被调用，当前长度:", localMsgList.length);
        console.trace("🔍 调用堆栈："); // 👈 打印堆栈，看是谁在调用
        localMsgList.push({ html: htmlStr });
        if (localMsgList.length > MAX_LOCAL_SHOW) localMsgList.shift();

    } finally {
        isAppending = false;
    }
}
    
function renderAllLocal() {
    const chatBox = document.getElementById("chat-box");
    let allHtml = "";
    localMsgList.forEach(item => allHtml += item.html);
    chatBox.innerHTML = allHtml || `<div style="text-align:center; color:#a11d48; font-size:13px; margin-top:20px;">Here.Not tired.</div>`;
    setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 50);
}
    
function createNewSession() {
    const newSid = 'room_' + Date.now();
    currentSessionId = newSid;
    localStorage.setItem('currentSessionId', newSid);
    localMsgList = [];
    renderAllLocal();
}

function renderTextOrImage(contentStr) {
    if (!contentStr) return '';
    let text = String(contentStr);

    const imageRegex = /(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp))/gi;
    const matches = text.match(imageRegex);
    if (matches) {
        if (text.trim() === matches[0]) {
            return `<img src="${matches[0]}" class="chat-sticker-img" alt="表情包" style="max-width:140px;max-height:140px;display:block;margin:4px 0;">`;
        }
        let result = text.replace(imageRegex, function(url) {
            return `<img src="${url}" class="chat-sticker-img" alt="表情包" style="max-width:140px;max-height:140px;display:block;margin:4px 0;">`;
        });
        text = result;
    }

    const thinkRegex = /【思考】\s*([\s\S]*?)\s*【回答】\s*/;
    const match = text.match(thinkRegex);
    if (match) {
        const thinking = match[1].trim();
        const answer = text.replace(thinkRegex, '').trim();

        let timeDisplay = '';
        const timeMatch = thinking.match(/(\d+)\s*秒|(\d+)\s*s/i);
        if (timeMatch) {
            timeDisplay = `Thinking ${timeMatch[1] || timeMatch[2]}s`;
        } else {
            const len = thinking.length;
            if (len > 200) timeDisplay = 'Deep Thinking';
            else if (len > 50) timeDisplay = 'Thinking';
            else timeDisplay = 'Quick Thinking';
        }

        return `
            <div style="background:#f9f0f2; padding:8px 12px; border-radius:8px; margin-bottom:10px; border-left:3px solid #ffb6c1;">
                <details>
                    <summary style="cursor:pointer; color:#a11d48; font-weight:500; font-size:13px; list-style:none; display:flex; align-items:center; gap:6px;">
                        <span>${timeDisplay} ></span>
                        <span style="font-size:11px; color:#aaa; font-weight:normal;">（click to expand）</span>
                    </summary>
                    <div style="margin-top:8px; color:#666; font-size:13px; line-height:1.7; white-space:pre-wrap; padding:8px 4px; border-top:1px dashed #f0d0d8;">${thinking.replace(/\n/g, '<br>')}</div>
                </details>
            </div>
            ${answer.replace(/\n/g, '<br>')}
        `;
    }

    return text.replace(/\n/g, '<br>');
}
    
function formatBeijingTime(dateInput) {
    if (!dateInput) return "";
    try {
        const d = new Date(dateInput);
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return `${m}/${day} ${h}:${min}`;
    } catch (e) { return "07/09 16:00"; }
}
    
async function typeSingleBubble(el, addText, fullText) {
    clearTimeout(streamRenderTimer);
    let temp = fullText.slice(0, fullText.length - addText.length);
    const chunkSize = 3;
    for (let i = 0; i < addText.length; i += chunkSize) {
        temp += addText.slice(i, i + chunkSize);
        el.innerHTML = renderTextOrImage(temp);
        streamRenderTimer = setTimeout(() => {
            const box = document.getElementById("chat-box");
            box.scrollTop = box.scrollHeight;
        }, 25);
        await new Promise(r => setTimeout(r, 60));
    }
}
    
function toggleDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById('header-dropdown');
    dropdown.style.display = dropdown.style.display === "flex" ? "none" : "flex";
}
    
function toggleSettings(show) {
    const panel = document.getElementById('settings-view');
    panel.style.display = show ? "flex" : "none";
    if (show) {
        document.getElementById('custom-bg-url').value = localStorage.getItem('rinka_home_bg') || "";
        document.getElementById('user-avatar-url').value = localStorage.getItem('rinka_avatar') || defaultUserAvatar;
        document.getElementById('ai-avatar-url').value = localStorage.getItem('rinka_ai_avatar') || defaultAiAvatar;
    }
}
    
function saveCosmetics() {
    const bg = document.getElementById('custom-bg-url').value.trim();
    const userAv = document.getElementById('user-avatar-url').value.trim();
    const aiAv = document.getElementById('ai-avatar-url').value.trim();
    if (bg) {
        localStorage.setItem('rinka_home_bg', bg);
        document.body.style.background = `url(${bg}) center/cover fixed`;
    } else {
        localStorage.removeItem("rinka_home_bg");
        document.body.style.background = "linear-gradient(135deg, #fff5f7 0%, #ffe3e8 100%)";
    }
    localStorage.setItem('rinka_avatar', userAv || defaultUserAvatar);
    localStorage.setItem('rinka_ai_avatar', aiAv || defaultAiAvatar);
    alert("🎨 装扮保存成功！");
    toggleSettings(false);
    renderAllLocal();
}

function createElementFromHTML(htmlString) {
    const div = document.createElement('div');
    div.innerHTML = htmlString.trim();
    return div.firstElementChild;
}

async function clearCloudHistory() {
    const host = ['localhost','127.0.0.1'].includes(location.hostname) ? '' : BACKEND_URL;
    try {
        await fetch(`${host}/clear-history`, { method: "DELETE" });
        localMsgList = [];
        renderAllLocal();
        alert("所有对话与长期记忆已清空");
    } catch (err) {
        alert("清空失败，请检查后端");
    }
}
       
let isFetching = false;

async function fetchHistory() {
    if (isFetching) {
        console.warn("⏭️ 正在加载历史，跳过本次请求");
        return;
    }
    isFetching = true;
    
    const chatBox = document.getElementById('chat-box');
    if (!chatBox) return;
    const host = ['localhost','127.0.0.1'].includes(location.hostname) ? '' : BACKEND_URL;
    try {
        const res = await fetch(`${host}/history?sessionId=${currentSessionId}&page=1&pageSize=${MAX_LOCAL_SHOW}&_t=${Date.now()}`, {cache:"no-cache"});
        if (!res.ok) throw new Error("接口异常");
        const historyData = await res.json();
        localMsgList = [];
        const uAv = localStorage.getItem('rinka_avatar') || defaultUserAvatar;
        const aAv = localStorage.getItem('rinka_ai_avatar') || defaultAiAvatar;
        historyData.forEach(item => {
            let html = "";
            const timeStr = formatBeijingTime(item.timestamp);
            if (item.role === "user") {
                html = `<div class="msg-row user-row"><img class="avatar" src="${uAv}"><div class="message user-msg"><div style="font-size:10px;color:#aaa;">${timeStr}</div><div class="msg-text">${renderTextOrImage(item.content)}</div></div></div>`;
            } else {
                const token = item.tokens_used ? `<span class="token-tag">${item.tokens_used}tokens</span>` : "";
                html = `<div class="msg-row ai-row" style="margin-top:-12px"><img src="${aAv}" class="avatar"><div class="message ai-msg"><div style="font-size:10px;color:#aaa;">${timeStr}</div><div class="msg-text">${renderTextOrImage(item.content)}</div>${token}</div></div>`;
            }
            appendMsgCache(html);
        });
        renderAllLocal();
    } catch (err) {
        console.error("加载历史失败：", err);
        chatBox.innerHTML = `<div style="text-align:center;padding:20px;color:red;">加载对话失败，请检查后端</div>`;
    }
}    

async function sendSticker(url, e) {
    if(e) {
        e.stopPropagation();
        e.preventDefault();
    }
    document.getElementById('emoji-pop-panel').style.display = "none";
    await executeSendAction(url);
}

let sendMessageLastTime = 0;
let sendMessageLock = false;

async function sendMessage() {
    if (sendMessageLock) {
        console.warn("⛔ sendMessage 执行锁拦截");
        return;
    }

    const now = Date.now();
    if (now - sendMessageLastTime < 1500) {
        console.warn("⛔ sendMessage 防抖拦截");
        return;
    }
    sendMessageLastTime = now;
    sendMessageLock = true;

    console.log("📨 sendMessage 执行，时间戳:", Date.now());
    console.log("📨 sendMessage 被调用，堆栈:", new Error().stack);

    try {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) {
            console.log("⏭️ 空消息，不发送");
            return;
        }

        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) sendBtn.disabled = true;
        input.value = "";

        try {
            await executeSendAction(text);
        } catch (err) {
            console.error("发送失败:", err);
        } finally {
            if (sendBtn) sendBtn.disabled = false;
        }
    } finally {
        sendMessageLock = false;
        globalSendLock = false; // 👈 释放 safeSendTrigger 的锁
        console.log("🔓 所有锁已释放");
    }
}
    
let executeLock = false;
let lastExecuteTime = 0;

async function executeSendAction(contentText) {
    // 1️⃣ 防抖 + 并发锁
    const now = Date.now();
    if (executeLock) {
        console.warn("⛔ 执行锁拦截（正在发送中）");
        return;
    }
    if (now - lastExecuteTime < 1000) {
        console.warn("⛔ 防抖拦截（1秒内重复）");
        return;
    }
    executeLock = true;
    lastExecuteTime = now;

    const execId = Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    console.log(`🔵 [${execId}] executeSendAction 开始，内容：`, contentText.slice(0, 20));

    if (globalAbort) globalAbort.abort();
    globalAbort = new AbortController();

    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById("sendBtn");
    const uAv = localStorage.getItem('rinka_avatar') || defaultUserAvatar;
    const aAv = localStorage.getItem('rinka_ai_avatar') || defaultAiAvatar;
    const host = ['localhost', '127.0.0.1'].includes(location.hostname) ? '' : BACKEND_URL;

    if (sendBtn) sendBtn.style.pointerEvents = "none";
    if (input) input.disabled = true;
    const currentTimeStr = formatBeijingTime(new Date());
    if (chatBox.innerHTML.includes("欢迎回家")) chatBox.innerHTML = "";

    // ---- 添加用户消息（直接操作 localMsgList，避免 appendMsgCache 的复杂逻辑） ----
    const userHtml = `<div class="msg-row user-row"><img class="avatar" src="${uAv}"><div class="message user-msg"><div style="font-size:10px;color:#aaa;">${currentTimeStr}</div><div class="msg-text">${renderTextOrImage(contentText)}</div></div></div>`;
    // 检查是否已存在（用内容去重）
    const existingUser = localMsgList.some(item => item.html && item.html.includes(contentText));
    if (!existingUser) {
        localMsgList.push({ html: userHtml });
        if (localMsgList.length > MAX_LOCAL_SHOW) localMsgList.shift();
    } else {
        console.warn("⏭️ 用户消息已存在，跳过添加");
    }
    renderAllLocal();

    // ---- AI 占位 ----
    const aiHtmlPlaceholder = `<div class="msg-row ai-row" style="margin-top: 10px;"><img src="${aAv}" class="avatar"><div class="message ai-msg"><div style="font-size:10px;color:#aaa;">${currentTimeStr}</div><div class="msg-text" id="streaming-ai-text">⏳ 思考中...</div></div></div>`;
    chatBox.insertAdjacentHTML('beforeend', aiHtmlPlaceholder);
    setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 30);

    const aiDom = document.getElementById('streaming-ai-text');

    try {
        console.log(`🟢 [${execId}] 发送请求...`);
        const res = await fetch(`${host}/chat`, {
            method: "POST",
            signal: globalAbort.signal,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId: currentSessionId, message: contentText }),
            cache: "no-cache"
        });

        if (!res.ok) {
            const errText = await res.text();
            throw new Error(`请求失败 (${res.status}): ${errText}`);
        }

        const data = await res.json();
        const reply = data.reply || "【无回复内容】";

        if (aiDom) {
            aiDom.innerHTML = renderTextOrImage(reply);
            aiDom.removeAttribute('id');
        }

        // ---- 添加 AI 回复（直接操作 localMsgList） ----
        const finalAiRow = chatBox.querySelector('.ai-row:last-child');
        if (finalAiRow) {
            const aiHtml = finalAiRow.outerHTML;
            // 检查是否已存在（用内容去重）
            const existingAi = localMsgList.some(item => item.html && item.html.includes(reply));
            if (!existingAi) {
                localMsgList.push({ html: aiHtml });
                if (localMsgList.length > MAX_LOCAL_SHOW) localMsgList.shift();
            } else {
                console.warn("⏭️ AI 回复已存在，跳过添加");
            }
        }

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (err) {
        if (err.name !== "AbortError") {
            console.error(`❌ [${execId}] 发送失败:`, err);
            if (aiDom) {
                aiDom.innerHTML = `<span style="color:#ff6b6b;">⚠️ 请求失败，请重试</span>`;
            }
        }
    } finally {
        executeLock = false;
        globalSendLock = false;
        if (sendBtn) sendBtn.style.pointerEvents = "auto";
        if (input) input.disabled = false;
        console.log(`🔓 [${execId}] executeSendAction 解锁`);
        // 最后再渲染一次，确保页面与 localMsgList 同步
        renderAllLocal();
    }
}

window.onload = async function() {
    isRequesting = false;
    globalAbort = null;
    const bg = localStorage.getItem('rinka_home_bg');
    if (bg) document.body.style.background = `url(${bg}) center/cover fixed`;
    currentSessionId = localStorage.getItem('currentSessionId') || 'default_room';
    await fetchHistory();
    renderAllLocal();

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.addEventListener('click', function(e) {
        e.preventDefault();
        safeSendTrigger(() => sendMessage());
    });

    const inputBox = document.getElementById('user-input');
    inputBox.addEventListener('keydown', function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            safeSendTrigger(() => sendMessage());
        }
    });
}

const emojiTrigger = document.getElementById('emoji-trigger');
if (emojiTrigger) {
    emojiTrigger.addEventListener('click', e => {
        e.stopPropagation();
        const ep = document.getElementById('emoji-pop-panel');
        ep.style.display = ep.style.display === "grid" ? "none" : "grid";
    });
}

document.addEventListener('click', () => {
    const d = document.getElementById('header-dropdown');
    const e = document.getElementById('emoji-pop-panel');
    if(d) d.style.display = "none";
    if(e) e.style.display = "none";
});
    
// 模型下拉关闭（已在 DOMContentLoaded 中处理）
</script>
