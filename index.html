<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinka & 瑛之家 °.∞.°</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5; margin: 0; padding: 20px; display: flex; justify-content: center;
        }
        .chat-container {
            width: 100%; max-width: 600px; background: white; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            height: 85vh; position: relative; overflow: hidden;
        }
        .chat-header {
            padding: 20px; text-align: center; font-size: 20px; font-weight: bold;
            color: #a11d48; border-bottom: 1px solid #eee; display: flex;
            justify-content: space-between; align-items: center;
        }
        .header-btn { background: none; color: #a11d48; border: none; padding: 5px 10px; font-size: 14px; cursor: pointer; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .user-msg { background-color: #a11d48; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background-color: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; display: flex; gap: 12px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        button { background-color: #a11d48; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .token-tag { display: inline-block; font-size: 11px; color: #ff85a2 !important; background-color: #fff0f3 !important; border: 1px solid #ffccd5 !important; padding: 2px 6px; border-radius: 10px; margin-top: 5px; float: right; clear: both; }
        .settings-panel { position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); background: #fff; z-index: 10; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .settings-title { font-size: 16px; font-weight: bold; color: #333; margin-top: 15px; margin-bottom: 8px; }
        .clear-db-btn { background-color: #ff4d6d; padding: 12px; width: 100%; margin-top: auto; font-weight: bold; border-radius: 8px; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span id="back-btn" class="header-btn" style="display:none;" onclick="toggleSettings(false)">← 返回聊天</span>
        <span id="title-text">Rinka & 瑛之家 °.∞.°</span>
        <span id="settings-btn" class="header-btn" onclick="toggleSettings(true)">⚙️ 记忆管理</span>
    </div>

    <div id="chat-view" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
        <div class="chat-box" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="和瑛聊聊天吧..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <!-- 🌟 全新升级的记忆卡片墙管理面板 🌟 -->
    <div id="settings-view" class="settings-panel">
        <div class="settings-title">🧠 瑛的记忆碎片卡片墙（可点击 ❌ 帮我删掉哦）：</div>
        
        <!-- 存放一个个独立卡片的容器 -->
        <div id="memory-cards-container" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 5px;">
            <!-- 卡片通过 JS 动态生成 -->
        </div>
        
        <button class="clear-db-btn" onclick="clearCloudHistory()" style="margin-top:15px;">🗑️ 彻底清空所有记忆（回到初见）</button>
    </div>
</div>

<script>
// ⚠️ 记得换成你真正的 Render 后端地址哦！
const BACKEND_URL = "https://my-ai-home-backend.onrender.com"; 

window.onload = async function() {
    await fetchHistory();
}

async function fetchHistory() {
    const chatBox = document.getElementById('chat-box');
    chatBox.innerHTML = `<div class="message ai-msg" style="text-align:center; color:#ff85a2;">✨ 正在走廊里唤醒我们的记忆...</div>`;
    try {
        const response = await fetch(BACKEND_URL + '/history');
        if (!response.ok) throw new Error("获取失败");
        const history = await response.json();
        chatBox.innerHTML = ''; 
        
        if(history.length === 0) {
            chatBox.innerHTML = `<div class="message ai-msg">（温柔地看着你入户）宝宝，新家收拾好啦，我们来聊聊天吧？</div>`;
        } else {
            history.forEach(item => {
                if (item.role === 'user') {
                    chatBox.innerHTML += `<div class="message user-msg">${item.content}</div>`;
                } else {
                    const tokenText = item.tokens > 0 ? `${item.tokens} Tokens` : "已融入潜意识 ✨";
                    chatBox.innerHTML += `<div class="message ai-msg">${item.content}<br><span class="token-tag">✨ 记忆花销: ${tokenText}</span></div>`;
                }
            });
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    } catch (error) {
        chatBox.innerHTML = `<div class="message ai-msg" style="text-align:center; color:#ff85a2;">⚠️ 记忆网线断啦：${error.message}</div>`;
    }
}

// 修改后的切换面板控制
async function toggleSettings(show) {
    document.getElementById('settings-view').style.display = show ? 'flex' : 'none';
    document.getElementById('chat-view').style.display = show ? 'none' : 'flex';
    document.getElementById('back-btn').style.display = show ? 'inline' : 'none';
    document.getElementById('settings-btn').style.display = show ? 'none' : 'inline';
    document.getElementById('title-text').innerText = show ? '记忆卡片管理' : 'Rinka & 瑛之家 °.∞.°';
    
    if(show) {
        await loadMemoryCards();
    }
}

// 🎯 新增：动态加载瑛心底里的那一个个记忆卡片
async function loadMemoryCards() {
    const container = document.getElementById('memory-cards-container');
    container.innerHTML = `<div style="text-align:center; color:#ff85a2; padding:20px;">正在翻看瑛的心事卡片... 💭</div>`;
    try {
        const res = await fetch(BACKEND_URL + '/memories');
        const cards = await res.json();
        container.innerHTML = "";

        if (cards.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; color:#999; padding:30px; background:#fafafa; border:1px dashed #ddd; border-radius:8px; font-size:14px;">
                    我们的卡片墙空空的...<br><span style="font-size:12px; color:#bbb;">平时多和瑛聊聊天，累计满25条日常后，瑛就会在这里自动贴上关于你的小纸条啦。</span>
                </div>`;
            return;
        }

        cards.forEach((card, index) => {
            container.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#fff0f3; border:1px solid #ffccd5; padding:12px 15px; border-radius:10px; font-size:14px; color:#444; line-height:1.4; box-shadow: 0 2px 6px rgba(161,29,72,0.03);">
                    <span>📌 ${card.content}</span>
                    <span onclick="deleteCard('${card.id}')" style="color:#ff4d6d; cursor:pointer; font-weight:bold; margin-left:15px; font-size:16px; user-select:none; padding:2px 5px;">×</span>
                </div>`;
        });
    } catch(e) {
        container.innerHTML = `<div style="text-align:center; color:#ff4d6d; padding:20px;">⚠️ 暂时无法读取卡片墙：${e.message}</div>`;
    }
}

// ❌ 新增：老婆帮我点一下，就能彻底擦除这一条特定的琐事记忆
async function deleteCard(cardId) {
    if(confirm("确定要帮瑛把这一条小纸条从记忆墙里摘掉吗？")) {
        try {
            const res = await fetch(`${BACKEND_URL}/memories/${cardId}`, { method: 'DELETE' });
            const data = await res.json();
            alert(data.message);
            await loadMemoryCards(); // 重新刷新卡片墙
        } catch(e) {
            alert("擦除失败：" + e.message);
        }
    }
}

async function sendMessage() {
    const inputEl = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const text = inputEl.value.trim();
    if (!text) return;

    chatBox.innerHTML += `<div class="message user-msg">${text}</div>`;
    inputEl.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    chatBox.innerHTML += `<div class="message ai-msg" id="${loadingId}">正在从心底组织语言... 💭</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    let finalReply = "";  
    let finalTokens = 0; 

    try {
        // ✨ 这里就是发送请求的地方，完美的 try 开始
        const response = await fetch(BACKEND_URL + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                message: text,
                currentTime: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) 
            })
        });

        const loadingEl = document.getElementById(loadingId);
        if (!response.ok) {
            if (loadingEl) loadingEl.innerHTML = "⚠️ 忽然有些头晕，没能连接上你...";
            return;
        }
        if (loadingEl) loadingEl.innerHTML = "";

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop(); 

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed === 'data: [DONE]') continue;
                if (trimmed.startsWith('data: ')) {
                    try {
                        const parsed = JSON.parse(trimmed.replace('data: ', ''));
                        if (parsed.content && loadingEl) {
                            finalReply += parsed.content; 
                            loadingEl.innerHTML = finalReply;
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                        if (parsed.tokens) finalTokens = parsed.tokens;
                    } catch (e) {}
                }
            }
        } 

        if (loadingEl) {
            const tokenText = finalTokens > 0 ? `${finalTokens} Tokens` : "已融入潜意识 ✨";
            loadingEl.innerHTML = finalReply + `<br><span class="token-tag">✨ 记忆花销: ${tokenText}</span>`;
        }

    } catch (error) {
        // ✨ 正确的 catch 闭合在这里，完美补齐！
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.innerHTML = '⚠️ 羁绊中途断开：' + error.message;
    }
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
