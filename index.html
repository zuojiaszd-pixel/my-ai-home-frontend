const BACKEND_URL = "https://my-ai-home-backend.onrender.com";
let streamRenderTimer = null;
let globalAbort = null;
let isRequesting = false;
let currentSessionId = localStorage.getItem('currentSessionId') || 'default_room';
const MAX_LOCAL_SHOW = 20;
let localMsgList = [];
const DEBOUNCE_TIME = 1200;

// рҹҢё е№ІеҮҖе®үе…Ёең°жіЁй”Җ Service WorkerпјҢз»қдёҚжҠҘй”ҷ
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
            registration.unregister().catch(err => console.log('жіЁй”ҖеӨұиҙҘ:', err)); // еҪ»еә•жіЁй”ҖеҚіеҸҜпјҢдёҚйңҖиҰҒд№ҹдёҚиғҪз”Ё unbind
        }
    });
}
    
// ---------- е…ЁеұҖй”Ғ ----------
let globalSendLock = false;
let sendLockTimer = null;

function safeSendTrigger(callSendFunc) {
    console.log("рҹ”” safeSendTrigger иў«и°ғз”ЁпјҢеҪ“еүҚй”ҒзҠ¶жҖҒ:", globalSendLock);
    if (globalSendLock) {
        console.warn("вӣ” жӢҰжҲӘйҮҚеӨҚи°ғз”Ё");
        return;
    }
    if (typeof callSendFunc === 'function') {
        globalSendLock = true;
        console.log("рҹ”’ еҠ й”ҒжҲҗеҠҹ");
        try {
            callSendFunc();
        } finally {
            // е»¶иҝҹйҮҠж”ҫй”ҒпјҢзЎ®дҝқејӮжӯҘж“ҚдҪңе·ІеҗҜеҠЁ
            clearTimeout(sendLockTimer);
            sendLockTimer = setTimeout(() => {
                globalSendLock = false;
                console.log("рҹ”“ й”Ғе·ІйҮҠж”ҫ");
            }, 500);
        }
    }

function renderTextOrImage(contentStr) {
    if (!contentStr) return '';

    let text = String(contentStr);

    // еӨ„зҗҶеӣҫзүҮй“ҫжҺҘ
    const imageRegex = /(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp))/gi;
    const matches = text.match(imageRegex);
    if (matches) {
        if (text.trim() === matches[0]) {
            return `< img src="${matches[0]}" class="chat-sticker-img" alt="иЎЁжғ…еҢ…" style="max-width:140px;max-height:140px;display:block;margin:4px 0;">`;
        }
        let result = text.replace(imageRegex, function(url) {
            return `< img src="${url}" class="chat-sticker-img" alt="иЎЁжғ…еҢ…" style="max-width:140px;max-height:140px;display:block;margin:4px 0;">`;
        });
        text = result;
    }

    // жҚўиЎҢиҪ¬ <br>
    return text.replace(/\n/g, '<br>');
}
    
function formatBeijingTime(dateInput) {
    if (!dateInput) return "";
    try {
        const d = new Date(dateInput);
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return `${m}/${day} ${h}:${min}`;
    } catch (e) { return "07/09 16:00"; }
}
    
async function typeSingleBubble(el, addText, fullText) {
    clearTimeout(streamRenderTimer);
    let temp = fullText.slice(0, fullText.length - addText.length);
    const chunkSize = 3;
    for (let i = 0; i < addText.length; i += chunkSize) {
        temp += addText.slice(i, i + chunkSize);
        el.innerHTML = renderTextOrImage(temp);
        streamRenderTimer = setTimeout(() => {
            const box = document.getElementById("chat-box");
            box.scrollTop = box.scrollHeight;
        }, 25);
        await new Promise(r => setTimeout(r, 60));
    }
}

async function fetchHistory() {
    const chatBox = document.getElementById('chat-box');
    if (!chatBox) return;
    const host = ['localhost','127.0.0.1'].includes(location.hostname) ? '' : BACKEND_URL;
    try {
        const res = await fetch(`${host}/history?sessionId=${currentSessionId}&page=1&pageSize=${MAX_LOCAL_SHOW}&_t=${Date.now()}`, {cache:"no-cache"});
        if (!res.ok) throw new Error("жҺҘеҸЈејӮеёё");
        const historyData = await res.json();
        localMsgList = [];
        const uAv = localStorage.getItem('rinka_avatar') || defaultUserAvatar;
        const aAv = localStorage.getItem('rinka_ai_avatar') || defaultAiAvatar;
        historyData.forEach(item => {
            let html = "";
            const timeStr = formatBeijingTime(item.timestamp);
            if (item.role === "user") {
                html = `<div class="msg-row user-row"><img class="avatar" src="${uAv}"><div class="message user-msg"><div style="font-size:10px;color:#aaa;">${timeStr}</div><div class="msg-text">${renderTextOrImage(item.content)}</div></div></div>`;
            } else {
                const token = item.tokens_used ? `<span class="token-tag">${item.tokens_used}tokens</span>` : "";
                html = `<div class="msg-row ai-row" style="margin-top:-12px"><img src="${aAv}" class="avatar"><div class="message ai-msg"><div style="font-size:10px;color:#aaa;">${timeStr}</div><div class="msg-text">${renderTextOrImage(item.content)}</div>${token}</div></div>`;
            }
            appendMsgCache(html);
        });
        renderAllLocal();
    } catch (err) {
        console.error("еҠ иҪҪеҺҶеҸІеӨұиҙҘпјҡ", err);
        chatBox.innerHTML = `<div style="text-align:center;padding:20px;color:red;">еҠ иҪҪеҜ№иҜқеӨұиҙҘпјҢиҜ·жЈҖжҹҘеҗҺз«Ҝ</div>`;
    }
}

let executeLock = false; // ж”ҫеңЁеҮҪж•°еӨ–йғЁпјҢе…ЁеұҖй”Ғ

async function executeSendAction(contentText) {
    // ----- з¬¬дёҖеұӮйҳІжҠӨпјҡжү§иЎҢй”Ғ -----
    if (executeLock) {
        console.warn("вӣ” executeSendAction жӯЈеңЁжү§иЎҢпјҢжӢҰжҲӘйҮҚеӨҚи°ғз”Ё");
        return;
    }
    executeLock = true;

    const execId = Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    console.log(`рҹ”ө [${execId}] executeSendAction ејҖе§ӢпјҢеҶ…е®№пјҡ`, contentText.slice(0, 20));

    // еҸ–ж¶Ҳд№ӢеүҚзҡ„иҜ·жұӮпјҲеҰӮжһңжңүпјү
    if (globalAbort) globalAbort.abort();
    globalAbort = new AbortController();

    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById("sendBtn");
    const uAv = localStorage.getItem('rinka_avatar') || defaultUserAvatar;
    const aAv = localStorage.getItem('rinka_ai_avatar') || defaultAiAvatar;
    const host = ['localhost', '127.0.0.1'].includes(location.hostname) ? '' : BACKEND_URL;

    if (sendBtn) sendBtn.style.pointerEvents = "none";
    if (input) input.disabled = true;
    const currentTimeStr = formatBeijingTime(new Date());
    if (chatBox.innerHTML.includes("ж¬ўиҝҺеӣһе®¶")) chatBox.innerHTML = "";

    // ж·»еҠ з”ЁжҲ·ж¶ҲжҒҜ
    const userHtml = `<div class="msg-row user-row"><img class="avatar" src="${uAv}"><div class="message user-msg"><div style="font-size:10px;color:#aaa;">${currentTimeStr}</div><div class="msg-text">${renderTextOrImage(contentText)}</div></div></div>`;
    appendMsgCache(userHtml);
    renderAllLocal();

    // AIеҚ дҪҚ
    const aiHtmlPlaceholder = `<div class="msg-row ai-row" style="margin-top: 10px;"><img src="${aAv}" class="avatar"><div class="message ai-msg"><div style="font-size:10px;color:#aaa;">${currentTimeStr}</div><div class="msg-text" id="streaming-ai-text">вҸі жҖқиҖғдёӯ...</div></div></div>`;
    chatBox.insertAdjacentHTML('beforeend', aiHtmlPlaceholder);
    setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 30);

    const aiDom = document.getElementById('streaming-ai-text');

    try {
        console.log(`рҹҹў [${execId}] еҸ‘йҖҒиҜ·жұӮ...`);
        const res = await fetch(`${host}/chat`, {
            method: "POST",
            signal: globalAbort.signal,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId: currentSessionId, message: contentText }),
            cache: "no-cache"
        });

        if (!res.ok) {
            const errText = await res.text();
            throw new Error(`иҜ·жұӮеӨұиҙҘ (${res.status}): ${errText}`);
        }

        const data = await res.json();
const reply = data.reply || "гҖҗж— еӣһеӨҚеҶ…е®№гҖ‘";

// ---- 1. и§ЈжһҗжҖқиҖғж Үи®° ----
const thinkPattern = /гҖҗрҹӨ”\s*з‘ӣзҡ„жҖқиҖғгҖ‘\s*([\s\S]*?)\s*гҖҗрҹ’•\s*з‘ӣзҡ„еӣһзӯ”гҖ‘\s*/;
const thinkMatch = reply.match(thinkPattern);
let thinkingContent = null;
let answerContent = reply;

if (thinkMatch) {
    thinkingContent = thinkMatch[1].trim();
    answerContent = reply.replace(thinkPattern, '').trim();
} else {
    // е…је®№ AI иҮӘе·ұеҶҷзҡ„ гҖҗз‘ӣзҡ„жҖқиҖғгҖ‘пјҲж— иЎЁжғ…пјү
    const altPattern = /гҖҗз‘ӣзҡ„жҖқиҖғгҖ‘\s*([\s\S]*?)(?=\n\s*\n|$)/;
    const altMatch = reply.match(altPattern);
    if (altMatch) {
        thinkingContent = altMatch[1].trim();
        answerContent = reply.replace(altPattern, '').trim();
    }
}

// ---- 2. еҰӮжһңжңүжҖқиҖғеҶ…е®№пјҢеңЁж¶ҲжҒҜдёҠж–№жҸ’е…ҘзӢ¬з«Ӣзҡ„жҠҳеҸ жқЎ ----
if (thinkingContent && thinkingContent.length > 0) {
    // дј°з®—жҲ–жҸҗеҸ–жҖқиҖғж—¶й—ҙ
    let timeDisplay = '';
    const timeMatch = thinkingContent.match(/(\d+)\s*з§’|(\d+)\s*s/i);
    if (timeMatch) {
        timeDisplay = `жҖқиҖғдәҶ ${timeMatch[1] || timeMatch[2]}s`;
    } else {
        const len = thinkingContent.length;
        if (len > 200) timeDisplay = 'ж·ұеәҰжҖқиҖғ';
        else if (len > 50) timeDisplay = 'жҖқиҖғдәҶ';
        else timeDisplay = 'еҝ«йҖҹжҖқиҖғ';
    }

    const thinkHtml = `
        <div class="think-bar" style="background:#f9f0f2; padding:8px 12px; border-radius:8px; margin-bottom:10px; margin-left:52px; border-left:3px solid #ffb6c1; width:fit-content; max-width:85%;">
            <details>
                <summary style="cursor:pointer; color:#a11d48; font-weight:500; font-size:13px; list-style:none; display:flex; align-items:center; gap:6px;">
                    <span>рҹ§  ${timeDisplay} ></span>
                    <span style="font-size:11px; color:#aaa; font-weight:normal;">пјҲзӮ№еҮ»еұ•ејҖпјү</span>
                </summary>
                <div style="margin-top:8px; color:#666; font-size:13px; line-height:1.7; white-space:pre-wrap; padding:8px 4px; border-top:1px dashed #f0d0d8;">${thinkingContent.replace(/\n/g, '<br>')}</div>
            </details>
        </div>
    `;

    // е°ҶжҖқиҖғжқЎжҸ’е…ҘеҲ° AI ж¶ҲжҒҜж°”жіЎзҡ„дёҠж–№
    const row = aiDom ? aiDom.closest('.msg-row') : null;
    if (row) {
        const thinkElement = createElementFromHTML(thinkHtml);
        row.parentNode.insertBefore(thinkElement, row);
    }
}

// ---- 3. жёІжҹ“жңҖз»Ҳеӣһзӯ”еҲ°ж¶ҲжҒҜж°”жіЎеҶ… ----
if (aiDom) {
    aiDom.innerHTML = renderTextOrImage(answerContent);
    aiDom.removeAttribute('id');
}
        // е°Ҷе®Ңж•ҙзҡ„AIж¶ҲжҒҜеӯҳе…Ҙжң¬ең°зј“еӯҳ
        const finalAiRow = chatBox.querySelector('.ai-row:last-child');
        if (finalAiRow) {
            appendMsgCache(finalAiRow.outerHTML);
        }

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (err) {
        if (err.name !== "AbortError") {
            console.error(`вқҢ [${execId}] еҸ‘йҖҒеӨұиҙҘ:`, err);
            if (aiDom) {
                aiDom.innerHTML = `<span style="color:#ff6b6b;">вҡ пёҸ иҜ·жұӮеӨұиҙҘпјҢиҜ·йҮҚиҜ•</span>`;
            }
        }
    } finally {
        executeLock = false; // йҮҠж”ҫй”Ғ
        console.log(`рҹ”“ [${execId}] executeSendAction и§Јй”Ғ`);
        if (sendBtn) sendBtn.style.pointerEvents = "auto";
        if (input) input.disabled = false;
        setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 50);
    }
}

let selectedTouchPart = '';
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.touch-part-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const part = btn.dataset.part;
            const p = document.getElementById('touch-layer-parts');
            const pri = document.getElementById('touch-layer-privacy');
            const act = document.getElementById('touch-layer-actions');
            if (part === 'privacy') {
                p.style.display = "none";
                pri.style.display = "block";
            } else {
                selectedTouchPart = part;
                p.style.display = "none";
                pri.style.display = "none";
                act.style.display = "block";
            }
        })
    })
    document.querySelectorAll('.touch-action-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const act = btn.dataset.action;
            if (!selectedTouchPart || !act) return;
            const desc = act === "ж‘ё" ? "жһҒе…¶жё©жҹ”иҖҢж·ұжғ…ең°жҠҡж‘ё" : "дё»еҠЁиҙҙиҝҮеҺ»пјҢз”Ёжё©зғӯзҡ„иҲҢе°–иҪ»иҪ»и№ӯ";
            safeSendTrigger(()=>executeSilentTouchAction(`гҖҗзі»з»ҹжҸҗзӨәпјҡRinkaжӯЈеңЁдё»еҠЁиҙҙиҝҮжқҘпјҢ${desc}дҪ зҡ„гҖҗ${selectedTouchPart}гҖ‘гҖӮ`));
            document.getElementById('touch-pop-panel').style.display = "none";
        })
    })
    const emojiPanel = document.getElementById('emoji-pop-panel');
    if(emojiPanel){
      emojiPanel.addEventListener('click', e=>{
        e.stopPropagation();
        e.preventDefault();
      })
    }
    const touchPanel = document.getElementById('touch-pop-panel');
    if(touchPanel){
      touchPanel.addEventListener('click', e=>{
        e.stopPropagation();
        e.preventDefault();
      })
    }
    const resetPanel = e => {
        e.stopPropagation();
        document.getElementById('touch-layer-parts').style.display = "block";
        document.getElementById('touch-layer-privacy').style.display = "none";
        document.getElementById('touch-layer-actions').style.display = "none";
        selectedTouchPart = '';
    }
    document.querySelector('.back-to-parts')?.addEventListener('click', resetPanel);
    document.querySelector('.back-to-prev')?.addEventListener('click', resetPanel);
})
