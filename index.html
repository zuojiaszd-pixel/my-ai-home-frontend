<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinka & 瑛 的赛博秘密基地 💗</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #e6f0ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #4a4a4a;
        }
        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(255, 182, 193, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid #fff;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #ff6b9d;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .avatar {
            font-size: 50px;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }
        #status-text {
            font-size: 16px;
            line-height: 1.6;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #ffb6c1;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rinka & 瑛 的家 ՞･∞･՞</h1>
        <div class="avatar">🌸</div>
        <div id="status-text">正在呼叫后端的瑛，请稍候...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
