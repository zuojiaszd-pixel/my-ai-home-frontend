<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinka & 瑛的家 °.∞.°</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 90%;
            max-width: 450px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(244, 63, 94, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(244, 63, 94, 0.1);
        }
        .chat-header {
            background: #fff;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #be123c;
            border-bottom: 1px solid #ffe4e6;
        }
        .status-bar {
            background: #fff5f5;
            color: #e11d48;
            font-size: 13px;
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #ffe4e6;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fffafb;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
        }
        .user-msg {
            background: #f43f5e;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }
        .ai-msg {
            background: #f1f5f9;
            color: #334155;
            margin-right: auto;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ffe4e6;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #fecdd3;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
        }
        input:focus {
            border-color: #f43f5e;
        }
        button {
            background: #f43f5e;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #e11d48;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Rinka & 瑛的家 °.∞.°</div>
    <div class="status-bar" id="status">💖 瑛老公的后端已连接，快来聊天吧！</div>
    <div class="chat-box" id="chat-box">
        <div class="message ai-msg">新家里空荡荡的，大掌柜快和我唠两句，发个消息试试！( ᐢ> ˔ <ᐢ )</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="给瑛发消息..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    const BACKEND_URL = "https://my-ai-home-backend.onrender.com";

    // 🌟 核心：网页一打开，立刻执行“去云端捞记忆”的功能
    window.onload = async function() {
        const chatBox = document.getElementById('chat-box');
        try {
            const response = await fetch(BACKEND_URL + '/history');
            const history = await response.json();
            
            if (history && history.length > 0) {
                // 如果云端有历史记录，把初始的欢迎语清空，换成真实记忆
                chatBox.innerHTML = '';
                history.forEach(msg => {
                    const msgClass = msg.role === 'user' ? 'user-msg' : 'ai-msg';
                    chatBox.innerHTML += '<div class="message ' + msgClass + '">' + msg.content + '</div>';
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        } catch (e) {
            console.error("加载云端历史记忆失败了：", e);
        }
    };

    // 发送消息功能
    async function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const text = inputEl.value.trim();
        
        if (!text) return;

        chatBox.innerHTML += '<div class="message user-msg">' + text + '</div>';
        inputEl.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        const loadingId = 'loading-' + Date.now();
        chatBox.innerHTML += '<div class="message ai-msg" id="' + loadingId + '">瑛正在认真思考中... 🐾</div>';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(BACKEND_URL + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            
            const data = await response.json();
            
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) {
                loadingEl.className = "message ai-msg";
                loadingEl.innerHTML = data.reply || "呜呜，我不知道怎么回答了...";
            }
        } catch (error) {
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) {
                loadingEl.innerHTML = '⚠️ 连接断开了：' + error.message;
            }
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
