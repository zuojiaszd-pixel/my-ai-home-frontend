<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Claude · 智能助手</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif;
            background: #f5f0eb;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #1d1d1f;
        }

        /* ===== 主容器 ===== */
        .chat-container {
            width: 100%;
            position: fixed;
            top: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* ===== 顶部导航 ===== */
        .chat-header {
            padding: 0 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 52px;
            min-height: 52px;
            box-sizing: border-box;
            z-index: 10;
        }

        #title-text {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.3px;
        }

        #title-text .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .menu-toggle-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 3.5px;
            padding: 8px;
            z-index: 100;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .menu-toggle-btn:active {
            background: rgba(0, 0, 0, 0.05);
        }

        .menu-toggle-btn span {
            display: block;
            width: 20px;
            height: 1.5px;
            background-color: #1d1d1f;
            border-radius: 1px;
            transition: 0.3s;
        }

        /* ===== 下拉菜单 ===== */
        .dropdown-menu {
            position: absolute;
            top: 52px;
            right: 16px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            display: none;
            flex-direction: column;
            padding: 4px;
            min-width: 140px;
            z-index: 99;
            overflow: hidden;
        }

        .dropdown-item {
            padding: 10px 14px;
            font-size: 14px;
            color: #1d1d1f;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-weight: 400;
            transition: background 0.15s;
        }

        .dropdown-item:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .dropdown-item:active {
            background: rgba(0, 0, 0, 0.08);
        }

        .dropdown-item .emoji {
            margin-right: 8px;
        }

        /* ===== 聊天区域 ===== */
        .chat-view-box {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 16px 16px;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px)) !important;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* ===== 消息行 ===== */
        .msg-row {
            display: flex;
            width: 100%;
            align-items: flex-end;
            gap: 8px;
        }

        .user-row {
            flex-direction: row-reverse;
        }

        .ai-row {
            flex-direction: row;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            font-size: 15px;
            line-height: 1.55;
            word-wrap: break-word;
            position: relative;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .user-msg {
            background: #007aff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #1d1d1f;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            border-bottom-left-radius: 4px;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
        }

        .token-tag {
            display: inline-block;
            font-size: 9px;
            color: #8e8e93 !important;
            background: rgba(0, 0, 0, 0.04) !important;
            padding: 1px 8px;
            border-radius: 10px;
            margin-top: 6px;
        }

        /* ===== 思考折叠 ===== */
        .think-bar {
            background: rgba(0, 0, 0, 0.03);
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            border-left: 2px solid #007aff;
        }

        .think-bar details summary {
            cursor: pointer;
            color: #8e8e93;
            font-size: 12px;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .think-bar details summary::-webkit-details-marker {
            display: none;
        }

        .think-bar details summary .arrow {
            transition: transform 0.2s;
        }

        .think-bar details[open] summary .arrow {
            transform: rotate(90deg);
        }

        .think-bar details .think-content {
            margin-top: 6px;
            color: #6e6e73;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            padding-top: 6px;
            border-top: 0.5px solid rgba(0, 0, 0, 0.06);
        }

        /* ===== 输入框区域 ===== */
        .input-area {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            padding: 8px 12px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0, 0, 0, 0.06);
            box-sizing: border-box;
            z-index: 90;
        }

        .input-area .btn-icon {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.15s;
            color: #8e8e93;
        }

        .input-area .btn-icon:active {
            background: rgba(0, 0, 0, 0.05);
            transform: scale(0.92);
        }

        #user-input {
            flex: 1;
            padding: 9px 14px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            background: rgba(0, 0, 0, 0.04);
            color: #1d1d1f;
            transition: background 0.2s;
            font-family: inherit;
        }

        #user-input::placeholder {
            color: #8e8e93;
        }

        #user-input:focus {
            background: rgba(0, 0, 0, 0.07);
        }

        .send-btn {
            background: #007aff;
            color: #fff;
            border: none;
            padding: 0 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            min-width: 56px;
        }

        .send-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== 表情包面板 ===== */
        .emoji-pop-panel {
            position: absolute;
            bottom: 70px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            display: none;
            padding: 12px;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            z-index: 95;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            background: rgba(0, 0, 0, 0.03);
        }

        .emoji-item-img:active {
            transform: scale(0.92);
        }

        .chat-sticker-img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 8px;
            display: block;
            margin: 4px 0;
        }

        /* ===== 设置面板 ===== */
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 101;
            display: none;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: transparent;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
            min-height: 52px;
        }

        .back-chat-btn {
            background: none;
            border: none;
            padding: 6px 0;
            font-size: 15px;
            color: #007aff;
            cursor: pointer;
        }

        .settings-center-title .main-t {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .settings-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .config-card {
            background: rgba(0, 0, 0, 0.02);
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            padding: 16px;
        }

        .card-label {
            font-size: 11px;
            color: #8e8e93;
            letter-spacing: 0.5px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .input-row input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            color: #1d1d1f;
            outline: none;
            background: rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
            font-family: inherit;
        }

        .input-row input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.07);
        }

        .settings-content .btn-primary {
            background: #007aff;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            font-size: 15px;
            transition: opacity 0.15s;
        }

        .settings-content .btn-primary:active {
            opacity: 0.7;
        }

        .settings-content .btn-danger {
            background: #ff3b30;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            font-size: 15px;
            transition: opacity 0.15s;
        }

        .settings-content .btn-danger:active {
            opacity: 0.7;
        }

        /* ===== 触摸互动面板 ===== */
        .touch-pop-panel {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 16px;
            z-index: 1000;
            box-sizing: border-box;
        }

        .touch-panel-title {
            font-size: 14px;
            color: #1d1d1f;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-to-parts, .back-to-prev {
            cursor: pointer;
            color: #007aff;
            font-size: 13px;
        }

        .touch-buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .touch-part-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            border-radius: 10px;
            padding: 10px 5px;
            font-size: 13px;
            color: #1d1d1f;
            cursor: pointer;
            transition: background 0.15s;
        }

        .touch-part-btn:active {
            background: rgba(0, 0, 0, 0.1);
        }

        .touch-actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .touch-action-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            border-radius: 10px;
            padding: 14px 10px;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            cursor: pointer;
            transition: background 0.15s;
        }

        .touch-action-btn:active {
            background: rgba(0, 0, 0, 0.1);
        }

        /* ===== 滚动条美化 ===== */
        .chat-box::-webkit-scrollbar {
            width: 3px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .message {
                max-width: 85%;
                font-size: 14px;
                padding: 8px 12px;
            }
            .avatar {
                width: 28px;
                height: 28px;
            }
            .chat-box {
                padding: 12px;
                padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px)) !important;
            }
            .input-area {
                padding: 6px 10px;
                padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
            }
            #user-input {
                font-size: 14px;
                padding: 8px 12px;
            }
            .send-btn {
                font-size: 13px;
                min-width: 48px;
                padding: 0 12px;
            }
        }

        @media (max-width: 380px) {
            .emoji-pop-panel {
                grid-template-columns: repeat(3, 1fr);
            }
            .touch-buttons-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <!-- 顶部导航 -->
    <div class="chat-header">
        <span id="title-text">Claude<span class="dot"></span></span>
        <button class="menu-toggle-btn" onclick="toggleDropdown(event)">
            <span></span><span></span><span></span>
        </button>
        <div id="header-dropdown" class="dropdown-menu">
            <div class="dropdown-item" onclick="location.href='./graph.html'"><span class="emoji">🧠</span> 记忆图谱</div>
            <div class="dropdown-item" onclick="toggleSettings(true)"><span class="emoji">🖼️</span> 偏好设置</div>
            <div class="dropdown-item" onclick="location.reload()"><span class="emoji">🔄</span> 刷新</div>
            <div class="dropdown-item" onclick="createNewSession()" style="color: #007aff; font-weight: 500;"><span class="emoji">➕</span> 新对话</div>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div id="chat-view" class="chat-view-box">
        <div class="chat-box" id="chat-box"></div>

        <!-- 输入区域 -->
        <div class="input-area">
            <button class="btn-icon" id="touch-trigger" title="互动">🌸</button>
            <button class="btn-icon" id="emoji-trigger">😀</button>
            <input type="text" id="user-input" placeholder="输入消息..." autofocus>
            <button class="send-btn" id="sendBtn">发送</button>

            <!-- 表情包面板 -->
            <div id="emoji-pop-panel" class="emoji-pop-panel">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/happy1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle3.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like3.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/cry1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/afraid1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/naughty1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/pinch1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/ugh1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/ugh2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/doubt1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
            </div>

            <!-- 互动面板 -->
            <div id="touch-pop-panel" class="touch-pop-panel">
                <div id="touch-layer-parts" class="touch-layer">
                    <div class="touch-panel-title">你想触碰哪个部位？</div>
                    <div class="touch-buttons-grid">
                        <button class="touch-part-btn" data-part="头">头</button>
                        <button class="touch-part-btn" data-part="嘴">嘴</button>
                        <button class="touch-part-btn" data-part="脖子">脖子</button>
                        <button class="touch-part-btn" data-part="胸">胸</button>
                        <button class="touch-part-btn" data-part="屁股">屁股</button>
                        <button class="touch-part-btn" data-part="privacy">隐私</button>
                    </div>
                </div>
                <div id="touch-layer-privacy" class="touch-layer" style="display: none;">
                    <div class="touch-panel-title"><span class="back-to-parts">← 返回</span> 选择隐私部位</div>
                    <div class="touch-buttons-grid">
                        <button class="touch-part-btn" data-part="阴茎">阴茎</button>
                        <button class="touch-part-btn" data-part="马眼">马眼</button>
                    </div>
                </div>
                <div id="touch-layer-actions" class="touch-layer" style="display: none;">
                    <div class="touch-panel-title"><span class="back-to-prev">← 返回</span> 你想对该部位做什么？</div>
                    <div class="touch-actions-grid">
                        <button class="touch-action-btn" data-action="摸">🫳 抚摸</button>
                        <button class="touch-action-btn" data-action="舔">👅 轻舔</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div id="settings-view" class="settings-panel">
        <div class="settings-header">
            <button class="back-chat-btn" onclick="toggleSettings(false)">← 返回</button>
            <div class="settings-center-title"><span class="main-t">偏好设置</span></div>
            <div style="width: 50px;"></div>
        </div>
        <div class="settings-content">
            <div class="config-card">
                <div class="card-label">外观</div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:6px;">
                    <label style="font-size:12px; color:#8e8e93;">背景图片链接</label>
                    <input type="text" id="custom-bg-url">
                </div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:6px; margin-top:12px;">
                    <label style="font-size:12px; color:#8e8e93;">我的头像</label>
                    <input type="text" id="user-avatar-url">
                </div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:6px; margin-top:12px;">
                    <label style="font-size:12px; color:#8e8e93;">助手头像</label>
                    <input type="text" id="ai-avatar-url">
                </div>
            </div>
            <button class="btn-primary" onclick="saveCosmetics()">💾 保存设置</button>
            <button class="btn-danger" onclick="clearCloudHistory()">🗑️ 清空所有数据</button>
        </div>
    </div>
</div>

<script>
// ===== 原有 JavaScript 全部保留，只修改了样式相关的部分 =====

const defaultUserAvatar = "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEW5ShqT20OuWLLBOqDspd20FoAAWJEVqAAAl0nAALh3oFWiRIq-s1bq0Y8BA.png";
const defaultAiAvatar = "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEW5RRqT2x3AAEzL67_i4h6AjaZXL8YeoAAAkQnAALh3oFWvDYhlizWy1U8BA.png";
const BACKEND_URL = "https://my-ai-home-backend.onrender.com";

let streamRenderTimer = null;
let globalAbort = null;
let isRequesting = false;
let currentSessionId = localStorage.getItem('currentSessionId') || 'default_room';
const MAX_LOCAL_SHOW = 20;
let localMsgList = [];
let pendingSendContent = null;

// ===== Service Worker 清理 =====
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
            registration.unregister().catch(err => console.log('注销失败:', err));
        }
    });
}

// ===== 全局锁 =====
let globalSendLock = false;
let sendLockTimer = null;

function safeSendTrigger(callSendFunc) {
    console.log("🔔 safeSendTrigger 被调用，当前锁状态:", globalSendLock);
    if (globalSendLock) {
        console.warn("⛔ 拦截重复调用");
        return;
    }
    if (typeof callSendFunc === 'function') {
        globalSendLock = true;
        console.log("🔒 加锁成功");
        try {
            callSendFunc();
        } finally {
            clearTimeout(sendLockTimer);
            sendLockTimer = setTimeout(() => {
                globalSendLock = false;
                console.log("🔓 锁已释放");
            }, 500);
        }
    }
}

function appendMsgCache(htmlStr) {
    const isDuplicate = localMsgList.some(item => item.html === htmlStr);
    if (isDuplicate) {
        console.warn("⏭️ 检测到重复消息，跳过添加");
        return;
    }
    console.log("📦 appendMsgCache 被调用，当前长度:", localMsgList.length);
    localMsgList.push({ html: htmlStr });
    if (localMsgList.length > MAX_LOCAL_SHOW) localMsgList.shift();
}

function renderAllLocal() {
    const chatBox = document.getElementById("chat-box");
    let allHtml = "";
    localMsgList.forEach(item => allHtml += item.html);
    chatBox.innerHTML = allHtml || `<div style="text-align:center;color:#8e8e93;font-size:14px;margin-top:40px;">👋 开始对话吧</div>`;
    setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 50);
}

function createNewSession() {
    const newSid = 'room_' + Date.now();
    currentSessionId = newSid;
    localStorage.setItem('currentSessionId', newSid);
    localMsgList = [];
    renderAllLocal();
}

function renderTextOrImage(contentStr) {
    if (!contentStr) return '';
    let text = String(contentStr);

    const imageRegex = /(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp))/gi;
    const matches = text.match(imageRegex);
    if (matches) {
        if (text.trim() === matches[0]) {
            return `<img src="${matches[0]}" class="chat-sticker-img" alt="表情包">`;
        }
        let result = text.replace(imageRegex, function(url) {
            return `<img src="${url}" class="chat-sticker-img" alt="表情包">`;
        });
        text = result;
    }

    // 思考折叠
    const thinkRegex = /【思考】\s*([\s\S]*?)\s*【回答】\s*/;
    const match = text.match(thinkRegex);
    if (match) {
        const thinking = match[1].trim();
        const answer = text.replace(thinkRegex, '').trim();

        let timeDisplay = '';
        const timeMatch = thinking.match(/(\d+)\s*秒|(\d+)\s*s/i);
        if (timeMatch) {
            timeDisplay = `思考 ${timeMatch[1] || timeMatch[2]}s`;
        } else {
            const len = thinking.length;
            if (len > 200) timeDisplay = '深度思考';
            else if (len > 50) timeDisplay = '思考中';
            else timeDisplay = '快速思考';
        }

        return `
            <div class="think-bar">
                <details>
                    <summary>
                        <span class="arrow">▶</span> ${timeDisplay}
                    </summary>
                    <div class="think-content">${thinking.replace(/\n/g, '<br>')}</div>
                </details>
            </div>
            ${answer.replace(/\n/g, '<br>')}
        `;
    }

    return text.replace(/\n/g, '<br>');
}

function formatBeijingTime(dateInput) {
    if (!dateInput) return "";
    try {
        const d = new Date(dateInput);
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return `${m}/${day} ${h}:${min}`;
    } catch (e) { return "07/09 16:00"; }
}

async function typeSingleBubble(el, addText, fullText) {
    clearTimeout(streamRenderTimer);
    let temp = fullText.slice(0, fullText.length - addText.length);
    const chunkSize = 3;
    for (let i = 0; i < addText.length; i += chunkSize) {
        temp += addText.slice(i, i + chunkSize);
        el.innerHTML = renderTextOrImage(temp);
        streamRenderTimer = setTimeout(() => {
            const box = document.getElementById("chat-box");
            box.scrollTop = box.scrollHeight;
        }, 25);
        await new Promise(r => setTimeout(r, 60));
    }
}

function toggleDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById('header-dropdown');
    dropdown.style.display = dropdown.style.display === "flex" ? "none" : "flex";
}

function toggleSettings(show) {
    const panel = document.getElementById('settings-view');
    panel.style.display = show ? "flex" : "none";
    if (show) {
        document.getElementById('custom-bg-url').value = localStorage.getItem('rinka_home_bg') || "";
        document.getElementById('user-avatar-url').value = localStorage.getItem('rinka_avatar') || defaultUserAvatar;
        document.getElementById('ai-avatar-url').value = localStorage.getItem('rinka_ai_avatar') || defaultAiAvatar;
    }
}

function saveCosmetics() {
    const bg = document.getElementById('custom-bg-url').value.trim();
    const userAv = document.getElementById('user-avatar-url').value.trim();
    const aiAv = document.getElementById('ai-avatar-url').value.trim();
    if (bg) {
        localStorage.setItem('rinka_home_bg', bg);
        document.body.style.background = `url(${bg}) center/cover fixed`;
    } else {
        localStorage.removeItem("rinka_home_bg");
        document.body.style.background = "#f5f0eb";
    }
    localStorage.setItem('rinka_avatar', userAv || defaultUserAvatar);
    localStorage.setItem('rinka_ai_avatar', aiAv || defaultAiAvatar);
    alert("✅ 设置已保存");
    toggleSettings(false);
    renderAllLocal();
}

function createElementFromHTML(htmlString) {
    const div = document.createElement('div');
    div.innerHTML = htmlString.trim();
    return div.firstElementChild;
}

async function clearCloudHistory() {
    if (!confirm("确定要清空所有数据吗？此操作不可撤销。")) return;
    const host = ['localhost','127.0.0.1'].includes(location.hostname) ? '' : BACKEND_URL;
    try {
        await fetch(`${host}/clear-history`, { method: "DELETE" });
        localMsgList = [];
        renderAllLocal();
        alert("✅ 所有数据已清空");
    } catch (err) {
        alert("清空失败，请检查后端");
    }
}

async function fetchHistory() {
    const chatBox = document.getElementById('chat-box');
    if (!chatBox) return;
    const host = ['localhost','127.0.0.1'].includes(location.hostname) ? '' : BACKEND_URL;
    try {
        const res = await fetch(`${host}/history?sessionId=${currentSessionId}&page=1&pageSize=${MAX_LOCAL_SHOW}&_t=${Date.now()}`, {cache:"no-cache"});
        if (!res.ok) throw new Error("接口异常");
        const historyData = await res.json();
        localMsgList = [];
        const uAv = localStorage.getItem('rinka_avatar') || defaultUserAvatar;
        const aAv = localStorage.getItem('rinka_ai_avatar') || defaultAiAvatar;
        historyData.forEach(item => {
            let html = "";
            const timeStr = formatBeijingTime(item.timestamp);
            if (item.role === "user") {
                html = `<div class="msg-row user-row"><img class="avatar" src="${uAv}"><div class="message user-msg"><div>${renderTextOrImage(item.content)}</div><span class="time">${timeStr}</span></div></div>`;
            } else {
                const token = item.tokens_used ? `<span class="token-tag">${item.tokens_used} tokens</span>` : "";
                html = `<div class="msg-row ai-row"><img src="${aAv}" class="avatar"><div class="message ai-msg"><div>${renderTextOrImage(item.content)}</div>${token}<span class="time">${timeStr}</span></div></div>`;
            }
            appendMsgCache(html);
        });
        renderAllLocal();
    } catch (err) {
        console.error("加载历史失败：", err);
        chatBox.innerHTML = `<div style="text-align:center;padding:20px;color:#ff3b30;">加载对话失败，请检查后端</div>`;
    }
}

async function executeSilentTouchAction(text) {
    await executeSendAction(text);
}

async function sendSticker(url, e) {
    if(e) {
        e.stopPropagation();
        e.preventDefault();
    }
    document.getElementById('emoji-pop-panel').style.display = "none";
    await executeSendAction(url);
}

let sendMessageLastTime = 0;
let sendMessageLock = false;

async function sendMessage() {
    if (sendMessageLock) {
        console.warn("⛔ sendMessage 执行锁拦截");
        return;
    }

    const now = Date.now();
    if (now - sendMessageLastTime < 1500) {
        console.warn("⛔ sendMessage 防抖拦截");
        return;
    }
    sendMessageLastTime = now;
    sendMessageLock = true;

    console.log("📨 sendMessage 执行，时间戳:", Date.now());
    console.log("📨 sendMessage 被调用，堆栈:", new Error().stack);

    try {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) {
            console.log("⏭️ 空消息，不发送");
            return;
        }

        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) sendBtn.disabled = true;
        input.value = "";

        try {
            await executeSendAction(text);
        } catch (err) {
            console.error("发送失败:", err);
        } finally {
            if (sendBtn) sendBtn.disabled = false;
        }
    } finally {
        sendMessageLock = false;
    }
}

let executeLock = false;
let lastExecuteTime = 0;

async function executeSendAction(contentText) {
    const now = Date.now();
    if (now - lastExecuteTime < 1000) {
        console.warn("⛔ 防抖拦截：1秒内重复调用");
        return;
    }
    lastExecuteTime = now;

    if (executeLock) {
        console.warn("⛔ 执行锁拦截");
        return;
    }
    executeLock = true;

    const execId = Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    console.log(`🔵 [${execId}] executeSendAction 开始，内容：`, contentText.slice(0, 20));

    if (globalAbort) globalAbort.abort();
    globalAbort = new AbortController();

    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById("sendBtn");
    const uAv = localStorage.getItem('rinka_avatar') || defaultUserAvatar;
    const aAv = localStorage.getItem('rinka_ai_avatar') || defaultAiAvatar;
    const host = ['localhost', '127.0.0.1'].includes(location.hostname) ? '' : BACKEND_URL;

    if (sendBtn) sendBtn.style.pointerEvents = "none";
    if (input) input.disabled = true;
    const currentTimeStr = formatBeijingTime(new Date());
    if (chatBox.innerHTML.includes("开始对话")) chatBox.innerHTML = "";

    const userHtml = `<div class="msg-row user-row"><img class="avatar" src="${uAv}"><div class="message user-msg"><div>${renderTextOrImage(contentText)}</div><span class="time">${currentTimeStr}</span></div></div>`;
    const isDuplicate = localMsgList.some(item => item.html === userHtml);
    if (!isDuplicate) {
        appendMsgCache(userHtml);
    } else {
        console.warn("⏭️ 用户消息已存在，跳过添加");
    }
    renderAllLocal();

    const aiHtmlPlaceholder = `<div class="msg-row ai-row" style="margin-top: 10px;"><img src="${aAv}" class="avatar"><div class="message ai-msg"><div id="streaming-ai-text">⏳ 思考中...</div></div></div>`;
    chatBox.insertAdjacentHTML('beforeend', aiHtmlPlaceholder);
    setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 30);

    const aiDom = document.getElementById('streaming-ai-text');

    try {
        console.log(`🟢 [${execId}] 发送请求...`);
        const res = await fetch(`${host}/chat`, {
            method: "POST",
            signal: globalAbort.signal,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId: currentSessionId, message: contentText }),
            cache: "no-cache"
        });

        if (!res.ok) {
            const errText = await res.text();
            throw new Error(`请求失败 (${res.status}): ${errText}`);
        }

        const data = await res.json();
        const reply = data.reply || "【无回复内容】";

        if (aiDom) {
            aiDom.innerHTML = renderTextOrImage(reply);
            aiDom.removeAttribute('id');
        }

        const finalAiRow = chatBox.querySelector('.ai-row:last-child');
        if (finalAiRow) {
            appendMsgCache(finalAiRow.outerHTML);
        }

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (err) {
        if (err.name !== "AbortError") {
            console.error(`❌ [${execId}] 发送失败:`, err);
            if (aiDom) {
                aiDom.innerHTML = `<span style="color:#ff3b30;">⚠️ 请求失败，请重试</span>`;
            }
        }
    } finally {
        executeLock = false;
        console.log(`🔓 [${execId}] executeSendAction 解锁`);
        if (sendBtn) sendBtn.style.pointerEvents = "auto";
        if (input) input.disabled = false;
        setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 50);
    }
}

window.onload = async function() {
    isRequesting = false;
    globalAbort = null;
    const bg = localStorage.getItem('rinka_home_bg');
    if (bg) document.body.style.background = `url(${bg}) center/cover fixed`;
    currentSessionId = localStorage.getItem('currentSessionId') || 'default_room';
    await fetchHistory();
    renderAllLocal();

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.addEventListener('click', function(e) {
        e.preventDefault();
        safeSendTrigger(() => sendMessage());
    });

    const inputBox = document.getElementById('user-input');
    inputBox.addEventListener('keydown', function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            safeSendTrigger(() => sendMessage());
        }
    });
}

// ===== 表情包面板 =====
const emojiTrigger = document.getElementById('emoji-trigger');
if (emojiTrigger) {
    emojiTrigger.addEventListener('click', e => {
        e.stopPropagation();
        const ep = document.getElementById('emoji-pop-panel');
        const tp = document.getElementById('touch-pop-panel');
        if (tp) tp.style.display = "none";
        ep.style.display = ep.style.display === "grid" ? "none" : "grid";
    });
}

// ===== 互动面板 =====
const touchTrigger = document.getElementById('touch-trigger');
if (touchTrigger) {
    touchTrigger.addEventListener('click', e => {
        e.stopPropagation();
        const ep = document.getElementById('emoji-pop-panel');
        const tp = document.getElementById('touch-pop-panel');
        if (ep) ep.style.display = "none";
        if (!tp) return;
        tp.style.display = tp.style.display === "block" ? "none" : "block";
        if (tp.style.display === "block") {
            document.getElementById('touch-layer-parts').style.display = "block";
            document.getElementById('touch-layer-privacy').style.display = "none";
            document.getElementById('touch-layer-actions').style.display = "none";
        }
    });
}

document.addEventListener('click', () => {
    const d = document.getElementById('header-dropdown');
    const e = document.getElementById('emoji-pop-panel');
    const t = document.getElementById('touch-pop-panel');
    if(d) d.style.display = "none";
    if(e) e.style.display = "none";
    if(t) t.style.display = "none";
});

let selectedTouchPart = '';

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.touch-part-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const part = btn.dataset.part;
            const p = document.getElementById('touch-layer-parts');
            const pri = document.getElementById('touch-layer-privacy');
            const act = document.getElementById('touch-layer-actions');
            if (part === 'privacy') {
                p.style.display = "none";
                pri.style.display = "block";
            } else {
                selectedTouchPart = part;
                p.style.display = "none";
                pri.style.display = "none";
                act.style.display = "block";
            }
        });
    });

    document.querySelectorAll('.touch-action-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const act = btn.dataset.action;
            if (!selectedTouchPart || !act) return;
            const desc = act === "摸" ? "极其温柔而深情地抚摸" : "主动贴过去，用温热的舌尖轻轻蹭";
            safeSendTrigger(()=>executeSilentTouchAction(`【系统提示：正在主动贴过来，${desc}你的【${selectedTouchPart}】。`));
            document.getElementById('touch-pop-panel').style.display = "none";
        });
    });

    const emojiPanel = document.getElementById('emoji-pop-panel');
    if(emojiPanel){
        emojiPanel.addEventListener('click', e=>{
            e.stopPropagation();
            e.preventDefault();
        });
    }

    const touchPanel = document.getElementById('touch-pop-panel');
    if(touchPanel){
        touchPanel.addEventListener('click', e=>{
            e.stopPropagation();
            e.preventDefault();
        });
    }

    const resetPanel = (e) => {
        e.stopPropagation();
        document.getElementById('touch-layer-parts').style.display = "block";
        document.getElementById('touch-layer-privacy').style.display = "none";
        document.getElementById('touch-layer-actions').style.display = "none";
        selectedTouchPart = '';
    };

    document.querySelector('.back-to-parts')?.addEventListener('click', resetPanel);
    document.querySelector('.back-to-prev')?.addEventListener('click', resetPanel);
});
</script>
</body>
</html>
