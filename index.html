<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Claude</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif;
            background: #f2f2f7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #1c1c1e;
        }

        /* ===== 主容器（毛玻璃） ===== */
        .chat-container {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 顶部导航 ===== */
        .chat-header {
            padding: 0 16px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 50px;
            min-height: 50px;
            z-index: 10;
        }

        #title-text {
            font-size: 17px;
            font-weight: 600;
            color: #1c1c1e;
            letter-spacing: -0.3px;
        }

        #title-text .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
        }

        .menu-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .menu-toggle-btn:active {
            background: rgba(0, 0, 0, 0.05);
        }

        .menu-toggle-btn span {
            display: block;
            width: 18px;
            height: 1.5px;
            background-color: #1c1c1e;
            border-radius: 2px;
            transition: 0.2s;
        }

        /* ===== 下拉菜单 ===== */
        .dropdown-menu {
            position: absolute;
            top: 50px;
            right: 16px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            display: none;
            flex-direction: column;
            padding: 4px;
            min-width: 150px;
            z-index: 99;
            overflow: hidden;
        }

        .dropdown-item {
            padding: 10px 14px;
            font-size: 14px;
            color: #1c1c1e;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-weight: 400;
            transition: background 0.15s;
        }

        .dropdown-item:active {
            background: rgba(0, 0, 0, 0.05);
        }

        .dropdown-item .icon {
            margin-right: 8px;
        }

        .dropdown-item.accent {
            color: #007aff;
            font-weight: 500;
        }

        /* ===== 聊天区域 ===== */
        .chat-view-box {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 20px;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        /* ===== 消息行 ===== */
        .msg-row {
            display: flex;
            width: 100%;
            align-items: flex-end;
            gap: 8px;
        }

        .user-row {
            flex-direction: row-reverse;
        }

        .ai-row {
            flex-direction: row;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background: #e5e5ea;
        }

        .message {
            max-width: 75%;
            padding: 9px 14px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .user-msg {
            background: #007aff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #1c1c1e;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }

        .message .time {
            display: block;
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
        }

        .token-tag {
            display: inline-block;
            font-size: 9px;
            color: #8e8e93;
            background: rgba(0, 0, 0, 0.04);
            padding: 1px 8px;
            border-radius: 10px;
            margin-top: 4px;
        }

        /* ===== 思考折叠 ===== */
        .think-bar {
            background: rgba(0, 0, 0, 0.02);
            padding: 6px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            border-left: 2px solid #007aff;
        }

        .think-bar details summary {
            cursor: pointer;
            color: #8e8e93;
            font-size: 12px;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .think-bar details summary::-webkit-details-marker {
            display: none;
        }

        .think-bar details summary .arrow {
            transition: transform 0.2s;
            font-size: 10px;
        }

        .think-bar details[open] summary .arrow {
            transform: rotate(90deg);
        }

        .think-bar details .think-content {
            margin-top: 6px;
            color: #6e6e73;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            padding-top: 6px;
            border-top: 0.5px solid rgba(0, 0, 0, 0.04);
        }

        /* ===== 输入框区域 ===== */
        .input-area {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            padding: 6px 12px;
            padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            z-index: 90;
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            transition: background 0.15s;
            color: #8e8e93;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:active {
            background: rgba(0, 0, 0, 0.04);
            transform: scale(0.92);
        }

        #user-input {
            flex: 1;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            background: rgba(0, 0, 0, 0.04);
            color: #1c1c1e;
            transition: background 0.2s;
            font-family: inherit;
        }

        #user-input::placeholder {
            color: #8e8e93;
        }

        #user-input:focus {
            background: rgba(0, 0, 0, 0.06);
        }

        .send-btn {
            background: #007aff;
            color: #fff;
            border: none;
            padding: 0 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            min-width: 52px;
            letter-spacing: -0.2px;
        }

        .send-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== 表情包面板 ===== */
        .emoji-pop-panel {
            position: absolute;
            bottom: 68px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.05);
            border-radius: 14px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            display: none;
            padding: 12px;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            z-index: 95;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            background: rgba(0, 0, 0, 0.02);
        }

        .emoji-item-img:active {
            transform: scale(0.92);
        }

        .chat-sticker-img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 8px;
            display: block;
            margin: 4px 0;
        }

        /* ===== 设置面板 ===== */
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 101;
            display: none;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: transparent;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
            min-height: 50px;
        }

        .back-chat-btn {
            background: none;
            border: none;
            padding: 6px 0;
            font-size: 15px;
            color: #007aff;
            cursor: pointer;
        }

        .settings-center-title .main-t {
            font-size: 17px;
            font-weight: 600;
            color: #1c1c1e;
        }

        .settings-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .config-card {
            background: rgba(0, 0, 0, 0.02);
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            padding: 16px;
        }

        .card-label {
            font-size: 11px;
            color: #8e8e93;
            letter-spacing: 0.5px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .input-row input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            color: #1c1c1e;
            outline: none;
            background: rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
            font-family: inherit;
        }

        .input-row input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.06);
        }

        .btn-primary {
            background: #007aff;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            transition: opacity 0.15s;
        }

        .btn-primary:active {
            opacity: 0.7;
        }

        .btn-danger {
            background: #ff3b30;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            transition: opacity 0.15s;
        }

        .btn-danger:active {
            opacity: 0.7;
        }

        /* ===== 触摸互动面板 ===== */
        .touch-pop-panel {
            display: none;
            position: absolute;
            bottom: 68px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.05);
            border-radius: 14px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            padding: 16px;
            z-index: 1000;
            box-sizing: border-box;
        }

        .touch-panel-title {
            font-size: 14px;
            color: #1c1c1e;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-to-parts, .back-to-prev {
            cursor: pointer;
            color: #007aff;
            font-size: 13px;
        }

        .touch-buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .touch-part-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            border-radius: 10px;
            padding: 10px 5px;
            font-size: 13px;
            color: #1c1c1e;
            cursor: pointer;
            transition: background 0.15s;
        }

        .touch-part-btn:active {
            background: rgba(0, 0, 0, 0.08);
        }

        .touch-actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .touch-action-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            border-radius: 10px;
            padding: 14px 10px;
            font-size: 14px;
            font-weight: 500;
            color: #1c1c1e;
            cursor: pointer;
            transition: background 0.15s;
        }

        .touch-action-btn:active {
            background: rgba(0, 0, 0, 0.08);
        }

        /* ===== 滚动条 ===== */
        .chat-box::-webkit-scrollbar {
            width: 3px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .message {
                max-width: 85%;
                font-size: 14px;
                padding: 8px 12px;
            }
            .avatar {
                width: 28px;
                height: 28px;
            }
            .chat-box {
                padding: 12px 12px 16px;
                padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px));
            }
            .input-area {
                padding: 4px 10px;
                padding-bottom: calc(4px + env(safe-area-inset-bottom, 0px));
            }
            #user-input {
                font-size: 14px;
                padding: 6px 12px;
            }
            .send-btn {
                font-size: 13px;
                min-width: 44px;
                padding: 0 10px;
            }
        }

        @media (max-width: 380px) {
            .emoji-pop-panel {
                grid-template-columns: repeat(3, 1fr);
            }
            .touch-buttons-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <!-- 顶部导航 -->
    <div class="chat-header">
        <span id="title-text">Claude<span class="status-dot"></span></span>
        <button class="menu-toggle-btn" onclick="toggleDropdown(event)">
            <span></span><span></span><span></span>
        </button>
        <div id="header-dropdown" class="dropdown-menu">
            <div class="dropdown-item" onclick="location.href='./graph.html'"><span class="icon">🧠</span> 记忆图谱</div>
            <div class="dropdown-item" onclick="toggleSettings(true)"><span class="icon">🖼️</span> 偏好设置</div>
            <div class="dropdown-item" onclick="location.reload()"><span class="icon">🔄</span> 刷新</div>
            <div class="dropdown-item accent" onclick="createNewSession()"><span class="icon">➕</span> 新对话</div>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div id="chat-view" class="chat-view-box">
        <div class="chat-box" id="chat-box"></div>

        <!-- 输入区域 -->
        <div class="input-area">
            <button class="btn-icon" id="touch-trigger" title="互动">🌸</button>
            <button class="btn-icon" id="emoji-trigger">😀</button>
            <input type="text" id="user-input" placeholder="输入消息..." autofocus>
            <button class="send-btn" id="sendBtn">发送</button>

            <!-- 表情包面板 -->
            <div id="emoji-pop-panel" class="emoji-pop-panel">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/happy1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/snuggle3.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/like3.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/cry1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/afraid1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/naughty1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/pinch1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/ugh1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/ugh2.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
                <img class="emoji-item-img" src="https://zuojiaszd-pixel.github.io/my-ai-home-frontend/emoji/doubt1.jpg" onclick="safeSendTrigger(()=>sendSticker(this.src, event))">
            </div>

            <!-- 互动面板 -->
            <div id="touch-pop-panel" class="touch-pop-panel">
                <div id="touch-layer-parts" class="touch-layer">
                    <div class="touch-panel-title">你想触碰哪个部位？</div>
                    <div class="touch-buttons-grid">
                        <button class="touch-part-btn" data-part="头">头</button>
                        <button class="touch-part-btn" data-part="嘴">嘴</button>
                        <button class="touch-part-btn" data-part="脖子">脖子</button>
                        <button class="touch-part-btn" data-part="胸">胸</button>
                        <button class="touch-part-btn" data-part="屁股">屁股</button>
                        <button class="touch-part-btn" data-part="privacy">隐私</button>
                    </div>
                </div>
                <div id="touch-layer-privacy" class="touch-layer" style="display: none;">
                    <div class="touch-panel-title"><span class="back-to-parts">← 返回</span> 选择隐私部位</div>
                    <div class="touch-buttons-grid">
                        <button class="touch-part-btn" data-part="阴茎">阴茎</button>
                        <button class="touch-part-btn" data-part="马眼">马眼</button>
                    </div>
                </div>
                <div id="touch-layer-actions" class="touch-layer" style="display: none;">
                    <div class="touch-panel-title"><span class="back-to-prev">← 返回</span> 你想对该部位做什么？</div>
                    <div class="touch-actions-grid">
                        <button class="touch-action-btn" data-action="摸">🫳 抚摸</button>
                        <button class="touch-action-btn" data-action="舔">👅 轻舔</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div id="settings-view" class="settings-panel">
        <div class="settings-header">
            <button class="back-chat-btn" onclick="toggleSettings(false)">← 返回</button>
            <div class="settings-center-title"><span class="main-t">偏好设置</span></div>
            <div style="width: 50px;"></div>
        </div>
        <div class="settings-content">
            <div class="config-card">
                <div class="card-label">外观</div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:6px;">
                    <label style="font-size:12px; color:#8e8e93;">背景图片链接</label>
                    <input type="text" id="custom-bg-url">
                </div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:6px; margin-top:12px;">
                    <label style="font-size:12px; color:#8e8e93;">我的头像</label>
                    <input type="text" id="user-avatar-url">
                </div>
                <div class="input-row" style="flex-direction:column; align-items:flex-start; gap:6px; margin-top:12px;">
                    <label style="font-size:12px; color:#8e8e93;">助手头像</label>
                    <input type="text" id="ai-avatar-url">
                </div>
            </div>
