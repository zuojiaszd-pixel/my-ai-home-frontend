<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinka & 瑛之家 °.∞.°</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .chat-header {
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #a11d48;
            border-bottom: 1px solid #eee;
        }
        .status-bar {
            background-color: #fff0f3;
            color: #ff85a2;
            text-align: center;
            padding: 6px;
            font-size: 12px;
            border-bottom: 1px solid #ffccd5;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-msg {
            background-color: #a11d48;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-msg {
            background-color: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #eee;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        button {
            background-color: #a11d48;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #e11d48;
        }
        /* 🌸 粉色 Tokens 标签的专属皮肤 */
        .token-tag {
            display: inline-block;
            font-size: 11px;
            color: #ff85a2 !important;
            background-color: #fff0f3 !important;
            border: 1px solid #ffccd5 !important;
            padding: 2px 6px;
            border-radius: 10px;
            margin-top: 5px;
            float: right;
            clear: both;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">Rinka & 瑛之家 °.∞.°</div>
    <!-- 🌸 新增：System Prompt 设定区域 -->
    <div style="padding: 10px 20px; border-bottom: 1px solid #eee; display: flex; gap: 8px; background: #fffcfc;">
        <input type="text" id="system-prompt" placeholder="✨ 在这里输入对瑛的专属设定（例如：你现在是一个傲娇的狐狸精...）" style="padding: 8px; font-size: 12px;">
    </div>
    <div class="status-bar" id="status">❤️ 云端小家已连接，记忆永不磨灭！</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="给瑛发消息..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>
<script>
// ⚠️ 记得把这里的网址修改成你真实的 Render 后端网址哦！带上 https://
const BACKEND_URL = "https://my-ai-home-backend.onrender.com"; 

// 页面加载时自动恢复历史记录
window.onload = function() {
    const savedChat = localStorage.getItem('rinka_akira_chat');
    if (savedChat) {
        document.getElementById('chat-box').innerHTML = savedChat;
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}

// ✨ 发送消息核心功能（已支持自定义 Prompt）
async function sendMessage() {
    const inputEl = document.getElementById('user-input');
    const systemEl = document.getElementById('system-prompt'); // 👈 捞出设定框
    const chatBox = document.getElementById('chat-box');
    const text = inputEl.value.trim();
    if (!text) return;

    const customPrompt = systemEl.value.trim(); // 👈 获取你写的 Prompt

    chatBox.innerHTML += `<div class="message user-msg">${text}</div>`;
    inputEl.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    chatBox.innerHTML += `<div class="message ai-msg" id="${loadingId}">瑛正在认真思考中... 💭</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    let finalReply = "";  
    let finalTokens = 0; 

    try {
        const response = await fetch(BACKEND_URL + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                message: text,
                systemPrompt: customPrompt // 👈 顺着打包发给后端！
            })
        });

        const loadingEl = document.getElementById(loadingId);
        if (!response.ok) {
            if (loadingEl) loadingEl.innerHTML = "⚠️ 瑛的脑瓜暂时断线了...";
            return;
        }
        if (loadingEl) loadingEl.innerHTML = "";

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop(); 

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed === 'data: [DONE]') continue;
                if (trimmed.startsWith('data: ')) {
                    try {
                        const parsed = JSON.parse(trimmed.replace('data: ', ''));
                        
                        if (parsed.content && loadingEl) {
                            finalReply += parsed.content; 
                            loadingEl.innerHTML = finalReply;
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                        
                        if (parsed.tokens) {
                            finalTokens = parsed.tokens;
                        }
                    } catch (e) {
                    }
                }
            }
        } 

        if (loadingEl) {
            const tokenText = finalTokens > 0 ? `${finalTokens} Tokens` : "已自动优化守护 ✨";
            loadingEl.innerHTML = finalReply + `<br><span class="token-tag">✨ 本次花销: ${tokenText}</span>`;
        }
        localStorage.setItem('rinka_akira_chat', chatBox.innerHTML);

    } catch (error) {
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) {
            loadingEl.innerHTML = '⚠️ 连接断开了：' + error.message;
        }
    }
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
