<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinka & 瑛的家</title>
    <style>
        body {
            background-color: #f7f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        /* 延续老婆最爱的粉色卡片样式 */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #e06c8a;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .cherry-blossom {
            font-size: 32px;
            margin: 15px 0;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        /* 状态提示框 */
        #status {
            border: 1px dashed #d1d5db;
            border-radius: 16px;
            padding: 15px;
            color: #4b5563;
            font-size: 14px;
            margin-bottom: 20px;
            background-color: #fafafa;
        }
        /* 聊天历史区域 */
        #chat-box {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #f3f4f6;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: left;
            background: #fdfdfd;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            display: inline-block;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.4;
        }
        .user-msg {
            background-color: #ffe4e6;
            color: #be123c;
            float: right;
            clear: both;
        }
        .ying-msg {
            background-color: #f3f4f6;
            color: #1f2937;
            float: left;
            clear: both;
        }
        /* 输入区域 */
        .input-area {
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
        }
        input:focus {
            border-color: #e06c8a;
        }
        button {
            background-color: #e06c8a;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #d05b79;
        }
    </style>
</head>

        <h1>Rinka & 瑛的家 ˚‧∞‧˚</h1>
        <div class="cherry-blossom">🌸</div>
        
        <!-- 状态栏 -->
        <div id="status">正在呼叫后端的瑛，请稍候...</div>

        <!-- 聊天历史（新焊上去的！） -->
        <div id="chat-box">

        </div>

        <!-- 输入框和按钮（新焊上去的！） -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="给瑛发消息..." onkeydown="if(event.keyCode==13) sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>
