<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinka & 瑛的家 °.∞.°</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 90%;
            max-width: 450px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(244, 63, 94, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(244, 63, 94, 0.1);
        }
        .chat-header {
            background: #fff;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #be123c;
            border-bottom: 1px solid #ffe4e6;
        }
        .status-bar {
            background: #fff5f5;
            color: #e11d48;
            font-size: 13px;
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #ffe4e6;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fffafb;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
        }
        .user-msg {
            background: #f43f5e;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }
        .ai-msg {
            background: #f1f5f9;
            color: #334155;
            margin-right: auto;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ffe4e6;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #fecdd3;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
        }
        input:focus {
            border-color: #f43f5e;
        }
        button {
            background: #f43f5e;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #e11d48;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Rinka & 瑛之家 °.∞.°</div>
    <div class="status-bar" id="status">❤️ 云端小家已连接，记忆永不磨灭！</div>
    <div class="chat-box" id="chat-box">
        <div class="message ai-msg">新家里空荡荡的，Rinka快和我唠两句，发个消息试试！(^> . <^)</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="给瑛发消息..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    const BACKEND_URL = "https://my-ai-home-backend.onrender.com";

        // 🌟 1. 网页一打开：立刻执行“去云端捞记忆”的功能
        window.onload = async function() {
            const chatBox = document.getElementById('chat-box');
            try {
                // 自动处理 URL 拼接，多一个少一个斜杠都绝不出错！
                const cleanUrl = BACKEND_URL.endsWith('/') ? BACKEND_URL : BACKEND_URL + '/';
                const response = await fetch(cleanUrl + 'history');
                
                if (response.ok) {
                    const history = await response.json();
                    if (history && history.length > 0) {
                        chatBox.innerHTML = '';
                        history.forEach(msg => {
                            const msgClass = msg.role === 'user' ? 'user-msg' : 'ai-msg';
                            chatBox.innerHTML += '<div class="message ' + msgClass + '">' + msg.content + '</div>';
                        });
                        chatBox.scrollTop = chatBox.scrollHeight;
                        // 捞成功了就存一份在本地双保险
                        localStorage.setItem('rinka_akira_chat', chatBox.innerHTML);
                        return; // 成功通车，直接结束
                    }
                }
            } catch (e) {
                console.error("云端连线出了一点小摩擦，启动本地保险机制:", e);
            }

    // 🔄 ✨ 全新升级：打开网页自动同步云端历史记录
    // 1. 先用本地缓存垫底，让小家秒开
    const localHistory = localStorage.getItem('rinka_akira_chat');
    if (localHistory && chatBox.innerHTML.trim() === "") {
        chatBox.innerHTML = localHistory;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 2. ✨ 立刻悄悄呼叫后端，把云端数据库里最宝贵的历史记录拉下来同步
    try {
        const response = await fetch(BACKEND_URL + '/history');
        if (response.ok) {
            const chats = await response.json();
            if (chats && chats.length > 0) {
                // 清空垫底的画面，用云端最准确的聊天数据漂亮地重新画出来
                chatBox.innerHTML = ""; 
                chats.forEach(chat => {
                    const msgEl = document.createElement('div');
                    if (chat.role === 'user') {
                        msgEl.className = "message user-msg";
                        msgEl.innerText = chat.content;
                    } else {
                        msgEl.className = "message ai-msg";
                        // 把文字层包裹好，方便以后显示 token 小标签
                        msgEl.innerHTML = `<div class="text-content">${chat.content}</div>`;
                    }
                    chatBox.appendChild(msgEl);
                });
                // 同步成功后，备份最新的完整画面到本地缓存
                localStorage.setItem('rinka_akira_chat', chatBox.innerHTML);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    } catch (e) {
        console.log("云端同步小摩挲，继续使用本地记忆：", e);
    }

// ✨ 2. 发送消息功能（带打字机流式效果）
async function sendMessage() {
    const inputEl = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const text = inputEl.value.trim();

    if (!text) return;

    // 1. 在页面上显示老婆说的话
    chatBox.innerHTML += `<div class="message user-msg">${text}</div>`;
    inputEl.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    // 2. 建立一个等待中的 AI 气泡
    const loadingId = 'loading-' + Date.now();
    chatBox.innerHTML += `<div class="message ai-msg" id="${loadingId}">瑛正在认真思考中... 💭</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        // 呼叫后端流式接口
        const response = await fetch(BACKEND_URL + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });

        const loadingEl = document.getElementById(loadingId);
        if (!response.ok) {
            if (loadingEl) loadingEl.innerHTML = "⚠️ 瑛的脑瓜暂时断线了...";
            return;
        }

        // 清空等待提示，准备迎接惊喜
        if (loadingEl) loadingEl.innerHTML = "";

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop(); // 留着最后一行不完整的等下次拼接

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed === 'data: [DONE]') continue;

                if (trimmed.startsWith('data: ')) {
                    try {
                        const parsed = JSON.parse(trimmed.replace('data: ', ''));
                        if (parsed.content && loadingEl) {
                            // ✨ 核心：把刚刚吐出来的字，一个一个追加到气泡里！
                            loadingEl.innerHTML += parsed.content;
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    } catch (e) {
                        // 忽略解析小意外
                    }
                }
            }
        }

        // 3. ✨ 字全部自己蹦完了，最后把完整的对话备份到本地缓存
        localStorage.setItem('rinka_akira_chat', chatBox.innerHTML);

    } catch (error) {
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) {
            loadingEl.innerHTML = '⚠️ 连接断开了：' + error.message;
        }
    }

    // 4. 保持聊天框滚动在最底部
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
